const UsersPage = ({refresh, bump}) => {
  const [users, setU] = useState([...DB.users]);
  const [form, setForm] = useState({name:'', email:'', role:'recruiter'});
  const [error, setE] = useState('');
  useEffect(() => { setU([...DB.users]); }, [refresh]);

  const create = () => {
    setE('');
    if(!form.name || !form.email) return setE('Name and email required');
    if(DB.users.find(u => u.email === form.email)) return setE('Email already exists');
    DB.users.push({id: uid(), name: form.name, email: form.email, role: form.role, createdAt: now()});
    saveDB(); setForm({name:'', email:'', role:'recruiter'}); bump();
  };
  const del = (id) => {
    const i = DB.users.findIndex(u => u.id === id);
    if(i>-1){ DB.users.splice(i, 1); saveDB(); bump(); }
  };

  return (
    <div className="p-8 fade-in">
      <div className="flex items-center gap-3 mb-6">
        <div className="w-11 h-11 rounded-xl bg-blue-100 flex items-center justify-center text-2xl">👥</div>
        <div>
          <h1 className="text-2xl font-bold text-gray-900">Team</h1>
          <p className="text-gray-500 text-sm">Manage who has access</p>
        </div>
      </div>
      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 mb-6">
        <h2 className="font-bold text-gray-800 mb-4">Add Team Member</h2>
        <div className="flex gap-3 flex-wrap">
          <input className="flex-1 min-w-40 border border-gray-200 rounded-xl px-3 py-2.5 text-sm" placeholder="Full name *" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/>
          <input className="flex-1 min-w-40 border border-gray-200 rounded-xl px-3 py-2.5 text-sm" placeholder="Email *" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))}/>
          <select className="border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-white" value={form.role} onChange={e=>setForm(p=>({...p,role:e.target.value}))}>
            <option value="recruiter">Recruiter</option>
            <option value="admin">Admin</option>
          </select>
          <button onClick={create} className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl text-sm font-semibold">+ Add User</button>
        </div>
        {error && <p className="text-red-500 text-xs mt-2">{error}</p>}
      </div>
      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
        <table className="w-full">
          <thead><tr className="bg-gray-50 border-b border-gray-100">
            <th className="text-left text-xs font-semibold text-gray-500 uppercase px-6 py-3">User</th>
            <th className="text-left text-xs font-semibold text-gray-500 uppercase px-6 py-3">Email</th>
            <th className="text-left text-xs font-semibold text-gray-500 uppercase px-6 py-3">Role</th>
            <th className="text-left text-xs font-semibold text-gray-500 uppercase px-6 py-3">Joined</th>
            <th className="px-6 py-3"/>
          </tr></thead>
          <tbody>
            {users.map((u, i) => (
              <tr key={u.id} className={`border-b border-gray-50 last:border-0 ${i%2?'bg-gray-50/30':''}`}>
                <td className="px-6 py-4"><div className="flex items-center gap-3">
                  <Avatar url={`https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(u.name)}`} name={u.name} size="9"/>
                  <span className="font-semibold text-gray-900 text-sm">{u.name}</span>
                </div></td>
                <td className="px-6 py-4 text-gray-500 text-sm">{u.email}</td>
                <td className="px-6 py-4"><Badge cls={u.role==='admin'?'bg-indigo-100 text-indigo-700':'bg-green-100 text-green-700'}>{u.role}</Badge></td>
                <td className="px-6 py-4 text-gray-400 text-xs">{fmt(u.createdAt)}</td>
                <td className="px-6 py-4 text-right"><button onClick={()=>del(u.id)} className="text-xs text-red-400 hover:text-red-600">Remove</button></td>
              </tr>
            ))}
          </tbody>
        </table>
        {!users.length && <div className="py-16 text-center text-gray-400 text-sm">No users yet</div>}
      </div>
    </div>
  );
};

const SettingsPage = ({refresh, bump}) => {
  const [keys, setKeys] = useState({...getKeys()});
  const [saved, setSaved] = useState(false);
  const [show, setShow] = useState({});
  const [syncing, setSyncing] = useState(false);

  const save = () => {
    for(const [k, lsKey] of Object.entries(KEY_FIELDS)){ localStorage.setItem(lsKey, keys[k] || ''); }
    setSaved(true); setTimeout(()=>setSaved(false), 3000);
  };
  const conn = f => !!keys[f];
  const KeyField = ({label, field, placeholder, hint}) => (
    <div className="mb-4">
      <label className="block text-xs font-semibold text-gray-600 mb-1.5">{label}</label>
      {hint && <p className="text-gray-400 text-xs mb-2">{hint}</p>}
      <div className="relative">
        <input type={show[field]?'text':'password'} className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm pr-24 font-mono"
               placeholder={placeholder} value={keys[field]||''} onChange={e=>setKeys(p=>({...p, [field]: e.target.value}))}/>

          <button onClick={()=>setShow(p=>({...p, [field]: !p[field]}))} className="text-xs text-gray-400 hover:text-gray-600 px-1.5 py-1 rounded">{show[field]?'Hide':'Show'}</button>
          {keys[field] && <button onClick={()=>setKeys(p=>({...p, [field]: ''}))} className="text-xs text-red-400 hover:text-red-600 px-1.5 py-1 rounded">Clear</button>}
        </div>
      </div>
    </div>
  );
  const TextField = ({label, field, placeholder, hint}) => (
    <div className="mb-3">
      <label className="block text-xs font-semibold text-gray-600 mb-1">{label}</label>
      {hint && <p className="text-gray-400 text-[11px] mb-1.5">{hint}</p>}
      <input type="text" className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" placeholder={placeholder}
             value={keys[field]||''} onChange={e=>setKeys(p=>({...p, [field]: e.target.value}))}/>

    setSyncing(true);
    try { await syncAllToAirtable(); bump(); }

          <h1 className="text-2xl font-bold text-gray-900">Settings</h1>
          <p className="text-gray-500 text-sm">API keys and Airtable sync — all stored in your browser only</p>
        </div>
      </div>

      <div className="bg-indigo-50 border border-indigo-100 rounded-2xl p-4 mb-6">
        <p className="text-indigo-800 text-xs font-semibold mb-2">Connection status</p>
        <div className="flex gap-4 flex-wrap text-xs">
          <span className={conn('firecrawl')?'text-emerald-600':'text-gray-400'}>🔍 Firecrawl {conn('firecrawl')?'✓':'✗'}</span>
          <span className={conn('apollo')?'text-emerald-600':'text-gray-400'}>🎯 Apollo.io {conn('apollo')?'✓':'✗'}</span>
          <span className={conn('airtableKey')&&conn('airtableBase')?'text-emerald-600':'text-gray-400'}>⭐ Airtable {conn('airtableKey')&&conn('airtableBase')?'✓':'✗'}</span>
        </div>
        <p className="text-indigo-600 text-[11px] mt-2">Keys live in localStorage on this device. They never leave your browser except to call the API they belong to.</p>
      </div>

      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 mb-4">
        <h2 className="font-bold text-gray-800 mb-3">🔍 Firecrawl <span className={`text-xs px-2 py-0.5 rounded-full ml-2 ${conn('firecrawl')?'bg-green-100 text-green-700':'bg-gray-100 text-gray-500'}`}>{conn('firecrawl')?'connected':'not set'}</span></h2>
        <p className="text-gray-500 text-xs mb-3">Powers Need Detector + Scout. Free: 500 credits/month.</p>

      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 mb-4">
        <h2 className="font-bold text-gray-800 mb-3">🎯 Apollo.io <span className={`text-xs px-2 py-0.5 rounded-full ml-2 ${conn('apollo')?'bg-green-100 text-green-700':'bg-gray-100 text-gray-500'}`}>{conn('apollo')?'connected':'not set'}</span></h2>
        <p className="text-gray-500 text-xs mb-3">Powers Connector. Apollo.io → Settings → Integrations → API Keys.</p>

      </div>

      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 mb-6">
        <h2 className="font-bold text-gray-800 mb-3">⭐ Airtable Sync <span className={`text-xs px-2 py-0.5 rounded-full ml-2 ${conn('airtableKey')&&conn('airtableBase')?'bg-green-100 text-green-700':'bg-gray-100 text-gray-500'}`}>{conn('airtableKey')&&conn('airtableBase')?'connected':'not set'}</span></h2>
        <p className="text-gray-500 text-xs mb-3">Optional mirror of all 7 tables for team collaboration.</p>
        <KeyField label="Personal Access Token" field="airtableKey" placeholder="patXXXXXXXXXXXXXX" hint="airtable.com/create/tokens · scope: data.records:write"/>
        <KeyField label="Base ID" field="airtableBase" placeholder="appXXXXXXXXXXXXXX" hint="From the URL of your base"/>
        <p className="text-xs font-semibold text-gray-700 mt-4 mb-2">Table names (one per entity):</p>
        <div className="grid grid-cols-2 gap-2">
          <TextField label="Companies" field="airtableCompanies" placeholder="Companies"/>
          <TextField label="Hiring Managers" field="airtableManagers" placeholder="Hiring Managers"/>
          <TextField label="Hiring Needs" field="airtableNeeds" placeholder="Hiring Needs"/>
          <TextField label="Candidates" field="airtableCandidates" placeholder="Candidates"/>
          <TextField label="Validations" field="airtableValidations" placeholder="Validations"/>
          <TextField label="Matches" field="airtableMatches" placeholder="Matches"/>
          <TextField label="Outreach" field="airtableOutreach" placeholder="Outreach"/>
        </div>
        <button onClick={syncAirtable} disabled={syncing || !conn('airtableKey') || !conn('airtableBase')}
                className="w-full mt-3 bg-emerald-600 hover:bg-emerald-700 text-white py-2.5 rounded-xl text-sm font-semibold disabled:opacity-50 flex items-center justify-center gap-2">
          {syncing ? <><Spinner/> Syncing all tables…</> : '↗ Sync everything to Airtable now'}
        </button>
      </div>

      <button onClick={save} className={`w-full py-3.5 rounded-xl font-semibold text-sm shadow-sm ${saved?'bg-emerald-600 text-white':'bg-indigo-600 hover:bg-indigo-700 text-white'}`}>
        {saved ? '✓ Saved!' : 'Save API Keys'}
      </button>

      <div className="mt-6 bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
        <h2 className="font-bold text-gray-800 mb-3">💾 Backup & danger zone</h2>
        <div className="flex gap-3">
          <button onClick={exportAll} className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2.5 rounded-xl text-sm font-semibold">↓ Export JSON backup</button>
          <button onClick={wipeAll} className="flex-1 bg-red-50 hover:bg-red-100 text-red-600 py-2.5 rounded-xl text-sm font-semibold">⚠ Wipe local data</button>
        </div>
      </div>
    </div>
  );
};

/* ════════════════════════════════════════════════════════════════════
   APP
   ════════════════════════════════════════════════════════════════════ */
const App = () => {
  const [page, setPage] = useState('dashboard');
  const [query, setQuery] = useState({});
  const [refresh, setRefresh] = useState(0);
  const bump = () => setRefresh(r => r + 1);
  const navigateTo = (p, q={}) => { setPage(p); setQuery(q); bump(); };
  const setPageOnly = (p) => { setPage(p); setQuery({}); bump(); };

  const pages = {
    dashboard:        <Dashboard         setPage={setPageOnly}        refresh={refresh} bump={bump}/>,
    companies:        <CompaniesPage     refresh={refresh} bump={bump} navigateTo={navigateTo}/>,
    'hiring-managers':<HiringManagersPage refresh={refresh} bump={bump} navigateTo={navigateTo}/>,
    'hiring-needs':   <HiringNeedsPage   refresh={refresh} bump={bump} navigateTo={navigateTo} query={query}/>,
    candidates:       <CandidatesPage    refresh={refresh} bump={bump}/>,
    matches:          <MatchesPage       refresh={refresh} bump={bump} navigateTo={navigateTo} query={query}/>,
    outreach:         <OutreachPage      refresh={refresh} bump={bump}/>,
    users:            <UsersPage         refresh={refresh} bump={bump}/>,
    settings:         <SettingsPage      refresh={refresh} bump={bump}/>,
  };

  return (
    <div className="flex h-screen overflow-hidden">
      <Sidebar page={page} setPage={setPageOnly}/>
      <main className="ml-60 flex-1 overflow-y-auto">{pages[page] || pages.dashboard}</main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
