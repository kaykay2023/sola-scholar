<body class="bg-gray-50">
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useMemo} = React;

/* ════════════════════════════════════════════════════════════════════
   PERSISTENT STORE (localStorage)
   Schema (demand-first): companies → hiring_managers → hiring_needs →
   candidates → candidate_validations → matches → outreach
   ════════════════════════════════════════════════════════════════════ */
const STORAGE_KEY = 'sola_scholar_v2';
const DEFAULT_USERS = [
  {id:'u1', name:'Kay Rivera',  email:'kay@sola-scholar.io',    role:'admin',     createdAt:'2026-03-01T09:00:00Z'},
  {id:'u2', name:'Jordan Lee',  email:'jordan@sola-scholar.io', role:'recruiter', createdAt:'2026-03-05T10:00:00Z'},
];

function makeDefaultDB(){
  return {
    companies: [],
    hiring_managers: [],
    hiring_needs: [],
    candidates: [],
    candidate_validations: [],
    matches: [],
    outreach: [],
    users: DEFAULT_USERS.slice(),
    logs: [],
  };
}
function loadDB(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return makeDefaultDB();
    const parsed = JSON.parse(raw);
    const def = makeDefaultDB();
    return Object.fromEntries(Object.keys(def).map(k=>[k, Array.isArray(parsed[k]) ? parsed[k] : def[k]]));
  }catch(e){ return makeDefaultDB(); }
}
function saveDB(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(DB)); }
  catch(e){ console.warn('saveDB failed', e); }
}
let DB = loadDB();

/* ════════════════════════════════════════════════════════════════════
   HELPERS
   ════════════════════════════════════════════════════════════════════ */
let _idCounter = 0;
const uid = () => 'id_' + (++_idCounter) + '_' + Math.random().toString(36).slice(2, 8);
const now = () => new Date().toISOString();
const fmt = d => d ? new Date(d).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) : '–';
const fmtTime = d => d ? new Date(d).toLocaleString() : '–';
const pick = (arr, n=1) => { const s = [...arr].sort(()=>0.5-Math.random()); return n===1 ? s[0] : s.slice(0, n); };

const log = (agent, message, status='info') => {
  DB.logs.unshift({id: uid(), agent, message, status, ts: now()});
  if(DB.logs.length > 100) DB.logs.length = 100;
  saveDB();
};

const exportCSV = (rows, filename) => {
  if(!rows || !rows.length) return;
  const esc = v => '"' + String(v ?? '').replace(/"/g, '""') + '"';
  const headers = Object.keys(rows[0]);
  const csv = [headers.map(esc).join(','), ...rows.map(r => headers.map(h => esc(r[h])).join(','))].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = filename;
  a.click();
};

/* ── Normalization for dedupe ─────────────────────────────────────── */
const normUrl = u => {
  if(!u) return '';
  return String(u).trim().toLowerCase()
    .replace(/^https?:\/\//, '')
    .replace(/^www\./, '')
    .replace(/\/+$/, '')
    .replace(/\?.*$/, '');
};
const normLinkedIn = u => {
  const n = normUrl(u);
  if(!n.includes('linkedin.com/in/')) return '';
  return n;
};
const normGithub = u => {
  const n = normUrl(u);
  if(!n.includes('github.com/')) return '';
  // collapse to github.com/<user>
  const m = n.match(/github\.com\/([^\/]+)/);
  return m ? `github.com/${m[1]}` : '';
};
const normEmail = e => (e||'').trim().toLowerCase();
const normName = s => (s||'').trim().toLowerCase().replace(/\s+/g,' ');
const candidateDedupeKey = c => {
  const li = normLinkedIn(c.linkedinUrl || c.profileUrl || '');
  if(li) return 'li:' + li;
  const gh = normGithub(c.github || '');
  if(gh) return 'gh:' + gh;
  const em = normEmail(c.email || '');
  if(em) return 'em:' + em;
  const nm = normName(c.name || '');
  const co = normName(c.currentCompany || c.company || '');
  if(nm) return 'nc:' + nm + '|' + co;
  return 'rand:' + uid();
};

/* ── Repository helpers (CRUD + dedupe) ───────────────────────────── */
function findOrCreateCompany({name, domain, industry, size, hqLocation}){
  if(!name) return null;
  const norm = normName(name);
  let co = DB.companies.find(c => normName(c.name) === norm);
  if(co){
    if(domain && !co.domain) co.domain = domain;
    if(industry && !co.industry) co.industry = industry;
    if(size && !co.size) co.size = size;
    if(hqLocation && !co.hqLocation) co.hqLocation = hqLocation;
  } else {
    co = {
      id: uid(), name, domain: domain || '', industry: industry || '',
      size: size || '', hqLocation: hqLocation || '', hiringSignals: [],
      notes: '', createdAt: now()
    };
    DB.companies.push(co);
  }
  saveDB();
  return co;
}

function findOrCreateManager({name, title, companyId, email, emailConfidence='unknown', linkedinUrl='', roleCategory='Other', source='Manual'}){
  if(!name || !companyId) return null;
  const li = normLinkedIn(linkedinUrl);
  const em = normEmail(email);
  let m = null;
  if(li) m = DB.hiring_managers.find(x => normLinkedIn(x.linkedinUrl) === li);
  if(!m && em) m = DB.hiring_managers.find(x => normEmail(x.email) === em && x.companyId === companyId);
  if(!m) m = DB.hiring_managers.find(x => normName(x.name) === normName(name) && x.companyId === companyId);
  if(m){
    if(title && !m.title) m.title = title;
    if(email && !m.email) { m.email = email; m.emailConfidence = emailConfidence; }
    if(linkedinUrl && !m.linkedinUrl) m.linkedinUrl = linkedinUrl;
  } else {
    m = {
      id: uid(), companyId, name, title: title || '', roleCategory,
      email: email || '', emailConfidence, linkedinUrl: linkedinUrl || '',
      status: 'researching', source, createdAt: now(),
      avatarUrl: `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(name)}`
    };
    DB.hiring_managers.push(m);
  }
  saveDB();
  return m;
}

function createNeed(input){
  const need = {
    id: uid(),
    companyId: input.companyId,
    managerId: input.managerId || null,
    title: input.title || '',
    description: input.description || '',
    requiredSkills: input.requiredSkills || [],
    tools: input.tools || [],
    seniority: input.seniority || 'Mid',
    locationType: input.locationType || 'Remote',
    location: input.location || '',
    salaryRange: input.salaryRange || '',
    sourceUrl: input.sourceUrl || '',
    postedAt: input.postedAt || now(),
    confirmed: !!input.confirmed,
    confirmationEvidence: input.confirmationEvidence || [],
    urgency: input.urgency || 'Medium',
    status: input.status || 'open',
    createdAt: now()
  };
  DB.hiring_needs.push(need);
  saveDB();
  return need;
}

function findOrCreateCandidate(input){
  const key = candidateDedupeKey(input);
  let c = DB.candidates.find(x => x.dedupeKey === key);
  if(c){
    // Merge fields that are missing but available now
    const fields = ['name','currentTitle','currentCompany','location','github','linkedinUrl','portfolioUrl','resumeUrl','email','summary','avatarUrl'];
    for(const f of fields){ if(input[f] && !c[f]) c[f] = input[f]; }
    if(input.skills && input.skills.length){
      const set = new Set([...(c.skills||[]), ...input.skills]);
      c.skills = Array.from(set);
    }
  } else {
    c = {
      id: uid(),
      name: input.name || '',
      currentTitle: input.currentTitle || input.title || '',
      currentCompany: input.currentCompany || input.company || '',
      location: input.location || '',
      skills: input.skills || [],
      github: input.github || '',
      linkedinUrl: input.linkedinUrl || (input.profileUrl && input.profileUrl.includes('linkedin.com') ? input.profileUrl : ''),
      portfolioUrl: input.portfolioUrl || input.website || '',
      resumeUrl: input.resumeUrl || '',
      summary: input.summary || input.bio || '',
      email: input.email || '',
      source: input.source || 'Manual',
      avatarUrl: input.avatarUrl || `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(input.name||'U')}`,
      dedupeKey: key,
      createdAt: now()
    };
    DB.candidates.push(c);
  }
  saveDB();
  return c;
}

function createValidation(candidateId, payload){
  const v = {
    id: uid(),
    candidateId,
    validatedAt: now(),
    tier: payload.tier || 'Insufficient Data',
    proficiency: payload.proficiency || {},
    githubStats: payload.githubStats || null,
    certifications: payload.certifications || [],
    projects: payload.projects || [],
    evidenceNotes: payload.evidenceNotes || ''
  };
  DB.candidate_validations.push(v);
  saveDB();
  return v;
}
function latestValidation(candidateId){
  const all = DB.candidate_validations.filter(v => v.candidateId === candidateId);
  if(!all.length) return null;
  return all.slice().sort((a,b)=> new Date(b.validatedAt) - new Date(a.validatedAt))[0];
}
function tierFromScore(score){
  if(score >= 90) return 'Strong';
  if(score >= 80) return 'Good';
  if(score >= 70) return 'Possible';
  return 'Drop';
}

function createOrUpdateMatch({needId, candidateId, score, tier, matchedSkills, missingSkills, reasoning, rank}){
  let m = DB.matches.find(x => x.needId === needId && x.candidateId === candidateId);
  if(m){
    Object.assign(m, {score, tier, matchedSkills, missingSkills, reasoning, rank});
  } else {
    m = {
      id: uid(), needId, candidateId, score, tier,
      matchedSkills: matchedSkills || [], missingSkills: missingSkills || [],
      reasoning: reasoning || [], rank: rank || 0,
      status: 'proposed', createdAt: now()
    };
    DB.matches.push(m);
  }
  saveDB();
  return m;
}

function createOutreach({managerId, needId, matchIds, channel='email', subject, body, kind}){
  const o = {
    id: uid(),
    managerId,
    needId: needId || null,
    matchIds: matchIds || [],
    channel,
    subject: subject || '',
    body: body || '',
    kind: kind || (needId ? 'shortlist-pitch' : 'warm-intro'),
    status: 'drafted',
    sentAt: null,
    repliedAt: null,
    replyText: '',
    nextAction: '',
    createdAt: now()
  };
  DB.outreach.push(o);
  saveDB();
  return o;
}

/* ════════════════════════════════════════════════════════════════════
   API KEYS (browser-local; never sent anywhere except their respective APIs)
   ════════════════════════════════════════════════════════════════════ */
const KEY_FIELDS = {
  firecrawl: 'ss_firecrawl',
  apollo: 'ss_apollo',
  airtableKey: 'ss_airtable_key',
  airtableBase: 'ss_airtable_base',
  airtableCompanies: 'ss_airtable_t_companies',
  airtableManagers: 'ss_airtable_t_managers',
  airtableNeeds: 'ss_airtable_t_needs',
  airtableCandidates: 'ss_airtable_t_candidates',
  airtableValidations: 'ss_airtable_t_validations',
  airtableMatches: 'ss_airtable_t_matches',
  airtableOutreach: 'ss_airtable_t_outreach',
};
const getKeys = () => {
  const out = {};
  for(const [k, lsKey] of Object.entries(KEY_FIELDS)){ out[k] = localStorage.getItem(lsKey) || ''; }
  // Defaults for table names if Airtable base is configured but tables not named
  if(!out.airtableCompanies) out.airtableCompanies = 'Companies';
  if(!out.airtableManagers) out.airtableManagers = 'Hiring Managers';
  if(!out.airtableNeeds) out.airtableNeeds = 'Hiring Needs';
  if(!out.airtableCandidates) out.airtableCandidates = 'Candidates';
  if(!out.airtableValidations) out.airtableValidations = 'Validations';
  if(!out.airtableMatches) out.airtableMatches = 'Matches';
  if(!out.airtableOutreach) out.airtableOutreach = 'Outreach';
  return out;
};

/* ════════════════════════════════════════════════════════════════════
   AGENT 1 — THE CONNECTOR (find hiring managers via Apollo.io)
   Demand-first entry point.
   ════════════════════════════════════════════════════════════════════ */
const ROLE_TITLES = [
  'CISO','Chief Information Security Officer',
  'Director of Security','Director of Cloud Security','Director of Engineering',
  'Cloud Security Manager','SOC Manager','Security Operations Manager',
  'Head of Infrastructure','VP of Engineering','VP of Security',
  'Engineering Manager','Technical Recruiter','Talent Acquisition Partner'
];
function categorizeManagerTitle(title){
  const t = (title||'').toLowerCase();
  if(t.includes('ciso') || t.includes('chief information security')) return 'CISO';
  if(t.includes('director') && t.includes('security')) return 'Director-Security';
  if(t.includes('cloud security')) return 'Cloud-Security-Mgr';
  if(t.includes('soc')) return 'SOC-Mgr';
  if(t.includes('head of infra') || t.includes('infrastructure')) return 'Head-Infra';
  if(t.includes('vp') && (t.includes('eng') || t.includes('security'))) return 'VP-Eng';
  if(t.includes('talent') || t.includes('recruiter')) return t.includes('talent') ? 'TA-Partner' : 'Technical-Recruiter';
  if(t.includes('engineering manager') || t.includes('director of engineering')) return 'Director-Security';
  return 'Other';
}

async function runConnector({industry='', extraTitles=[]}={}){
  log('Connector', `Searching hiring managers${industry?` in ${industry}`:''}…`, 'running');
  const keys = getKeys();
  if(!keys.apollo){
    log('Connector', 'Apollo.io key missing — add it in Settings to find verified managers.', 'warn');
    return [];
  }
  const titles = extraTitles.length ? extraTitles : ROLE_TITLES;
  try{
    const body = {
      api_key: keys.apollo,
      person_titles: titles,
      page: 1,
      per_page: 15,
    };
    if(industry) body.q_keywords = industry;
    const res = await fetch('https://api.apollo.io/v1/mixed_people/search', {
      method:'POST',
      headers:{'Content-Type':'application/json','Cache-Control':'no-cache'},
      body: JSON.stringify(body),
    });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const people = data.people || [];
    if(!people.length){ log('Connector', 'Apollo returned 0 people — try broader industry/title.', 'warn'); return []; }

    let kept = 0, skippedNoEmail = 0;
    const created = [];
    for(const p of people){
      const name = p.name || `${p.first_name||''} ${p.last_name||''}`.trim();
      const title = p.title || '';
      const orgName = p.organization?.name || '';
      const orgIndustry = p.organization?.industry || industry || '';
      const empCount = p.organization?.employee_count;
      const orgSize = empCount ? `${empCount.toLocaleString()} employees` : '';
      const email = p.email || '';
      if(!name || !title || !orgName){ continue; }
      if(!email || !email.includes('@')){ skippedNoEmail++; continue; }

      const company = findOrCreateCompany({
        name: orgName,
        industry: orgIndustry,
        size: orgSize,
      });
      const linkedin = p.linkedin_url || '';
      const mgr = findOrCreateManager({
        name, title, companyId: company.id,
        email, emailConfidence: 'verified',
        linkedinUrl: linkedin,
        roleCategory: categorizeManagerTitle(title),
        source: 'Apollo'
      });
      created.push(mgr);
      kept++;
    }
    if(skippedNoEmail) log('Connector', `Dropped ${skippedNoEmail} records missing verified email.`, 'warn');
    log('Connector', `${kept} hiring managers ready (verified name+title+company+email).`, 'success');
    return created;
  }catch(e){
    log('Connector', `Error: ${e.message}`, 'error');
    return [];
  }
}

/* ════════════════════════════════════════════════════════════════════
   AGENT 2 — THE NEED DETECTOR (scrape job postings → hiring_needs)
   Uses Firecrawl search; structured parse of titles, skills, seniority.
   ════════════════════════════════════════════════════════════════════ */
const SKILL_LIBRARY = [
  // Cloud / security
  'Azure','AWS','GCP','Sentinel','Defender','Splunk','KQL','SIEM','SOC','SOAR','IAM','Zero Trust','MITRE',
  'Kubernetes','Terraform','Docker','CI/CD','DevOps','Linux',
  // Languages / frameworks
  'Python','JavaScript','TypeScript','React','Node.js','Java','Go','Ruby','PHP','C++','C#','Rust','Swift','Kotlin',
  // Data / ML
  'TensorFlow','PyTorch','Pandas','SQL','PostgreSQL','MongoDB','Redis','Snowflake',
  // Design
  'Figma','UX Research','Prototyping',
];
function extractSkills(text){
  const t = (text||'').toLowerCase();
  const found = new Set();
  for(const s of SKILL_LIBRARY){
    const re = new RegExp('(?:^|[^a-z0-9])' + s.toLowerCase().replace(/[+#.]/g,'\\$&') + '(?:[^a-z0-9]|$)', 'i');
    if(re.test(t)) found.add(s);
  }
  return Array.from(found);
}
function detectSeniority(text){
  const t = (text||'').toLowerCase();
  if(/\bprincipal\b/.test(t)) return 'Principal';
  if(/\bstaff\b/.test(t)) return 'Staff';
  if(/\bdirector\b/.test(t)) return 'Director';
  if(/\bsenior\b|\bsr\.?\b|\blead\b/.test(t)) return 'Senior';
  if(/\bjunior\b|\bjr\.?\b|\bentry\b|\bgrad\b/.test(t)) return 'Junior';
  return 'Mid';
}
function detectLocation(text){
  const t = (text||'').toLowerCase();
  if(/\bremote\b/.test(t)) return {locationType:'Remote', location:'Remote'};
  if(/\bhybrid\b/.test(t)) return {locationType:'Hybrid', location:''};
  const m = (text||'').match(/(San Francisco|New York|Austin|Seattle|Boston|Chicago|London|Berlin|Toronto|Los Angeles|Denver|Portland|Atlanta|Miami|Dallas|Phoenix|Washington|Philadelphia|Bangalore|Singapore|Sydney|Dublin|Amsterdam|Paris|Tokyo)/i);
  return {locationType: m?'Onsite':'Onsite', location: m ? m[0] : ''};
}

async function runNeedDetector(companyId){
  const company = DB.companies.find(c => c.id === companyId);
  if(!company){ log('Need Detector', 'Company not found.', 'error'); return []; }
  log('Need Detector', `Detecting open roles at ${company.name}…`, 'running');
  const keys = getKeys();
  if(!keys.firecrawl){
    log('Need Detector', 'Firecrawl key missing — add it in Settings.', 'warn');
    return [];
  }
  try{
    const query = `${company.name} careers job opening hiring`;
    const res = await fetch('https://api.firecrawl.dev/v1/search', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${keys.firecrawl}`},
      body: JSON.stringify({query, limit: 8, lang: 'en'})
    });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const items = (data.success && data.data) ? data.data : [];
    if(!items.length){ log('Need Detector', `No public job postings found for ${company.name}.`, 'warn'); return []; }

    const needs = [];
    for(const item of items.slice(0, 8)){
      const text = `${item.title||''} ${item.description||''}`;
      // Extract a job title — prefer the first segment of the page title before separators
      const rawTitle = (item.title||'').split(/[-–|·]/)[0].trim();
      if(!rawTitle) continue;
      // Filter out obvious non-jobs (homepage, blog, news)
      if(/blog|news|press|article|read more/i.test(rawTitle)) continue;

      const skills = extractSkills(text);
      const seniority = detectSeniority(rawTitle + ' ' + text);
      const loc = detectLocation(text);

      const need = createNeed({
        companyId: company.id,
        title: rawTitle.slice(0, 120),
        description: (item.description||'').slice(0, 600),
        requiredSkills: skills,
        seniority,
        locationType: loc.locationType,
        location: loc.location,
        sourceUrl: item.url || '',
        confirmed: false,
        confirmationEvidence: item.url ? [item.url] : [],
        urgency: 'Medium',
      });
      needs.push(need);
    }
    log('Need Detector', `Detected ${needs.length} unconfirmed roles at ${company.name}. Confirm to enable sourcing.`, 'success');
    return needs;
  }catch(e){
    log('Need Detector', `Error: ${e.message}`, 'error');
    return [];
  }
}

/* ════════════════════════════════════════════════════════════════════
   AGENT 3 — THE SCOUT (source candidates for a confirmed need)
   ════════════════════════════════════════════════════════════════════ */
async function runScout(needId){
  const need = DB.hiring_needs.find(n => n.id === needId);
  if(!need){ log('Scout', 'Hiring need not found.', 'error'); return []; }
  if(!need.confirmed){ log('Scout', 'Need is not confirmed yet — confirm it before sourcing.', 'warn'); return []; }

  const skills = need.requiredSkills || [];
  const skillQuery = skills.slice(0, 4).join(' ');
  const cutoff = new Date(Date.now() - 10*24*60*60*1000);
  const cutoffISO = cutoff.toISOString().slice(0, 10);
  const keys = getKeys();
  log('Scout', `Sourcing for "${need.title}" (skills: ${skills.join(', ')||'none'})…`, 'running');
  const collected = [];

  // ── Firecrawl ───────────────────────────────────────────────────
  if(keys.firecrawl){
    try{
      const query = `${skillQuery || need.title} engineer profile ${new Date().getFullYear()}`;
      const res = await fetch('https://api.firecrawl.dev/v1/search', {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${keys.firecrawl}`},
        body: JSON.stringify({query, limit: 10, lang: 'en'})
      });
      if(res.ok){
        const data = await res.json();
        const items = (data.success && data.data) ? data.data : [];
        for(const item of items){
          const desc = (item.description||'') + ' ' + (item.title||'');
          const parts = (item.title||'').split(/[-–|]/);
          const name = (parts[0]||'').trim().replace(/['"]/g,'');
          if(!name || name.length < 2) continue;
          const titlePart = (parts[1]||'').trim();
          const atMatch = titlePart.match(/^(.+?)\s+at\s+(.+)$/i);
          const cTitle = atMatch ? atMatch[1].trim() : titlePart;
          const cCompany = atMatch ? atMatch[2].trim() : '';
          const emailMatch = desc.match(/[\w.+-]+@[\w-]+\.[\w.]+/);
          const isLi = (item.url||'').includes('linkedin.com');
          collected.push(findOrCreateCandidate({
            name, title: cTitle, company: cCompany,
            location: '', summary: (item.description||'').slice(0,200),
            skills: extractSkills(desc),
            email: emailMatch ? emailMatch[0] : '',
            github: '', linkedinUrl: isLi ? (item.url||'') : '',
            portfolioUrl: !isLi ? (item.url||'') : '',
            source: isLi ? 'LinkedIn' : 'Web'
          }));
        }
        log('Scout', `Firecrawl: ${items.length} profiles parsed`, 'info');
      } else { log('Scout', `Firecrawl HTTP ${res.status}`, 'warn'); }
    }catch(e){ log('Scout', `Firecrawl error: ${e.message}`, 'warn'); }
  }

  // ── GitHub ──────────────────────────────────────────────────────
  try{
    const ghQ = `${skillQuery || need.title} type:user pushed:>${cutoffISO}`;
    const res = await fetch(`https://api.github.com/search/users?q=${encodeURIComponent(ghQ)}&per_page=8&sort=joined&order=desc`,
      {headers:{'Accept':'application/vnd.github.v3+json'}});
    if(res.ok){
      const data = await res.json();
      const items = (data.items || []).slice(0, 8);
      const detailPromises = items.map(u =>
        fetch(`https://api.github.com/users/${u.login}`, {headers:{'Accept':'application/vnd.github.v3+json'}})
          .then(r => r.ok ? r.json() : u).catch(()=>u)
      );
      const details = await Promise.all(detailPromises);
      const recent = details.filter(u => !u.updated_at || new Date(u.updated_at) >= cutoff);
      for(const u of recent){
        const name = u.name || u.login.replace(/-/g,' ').replace(/\b\w/g, c => c.toUpperCase());
        const blog = (u.blog||'').trim();
        collected.push(findOrCreateCandidate({
          name,
          title: u.bio ? u.bio.split(/[.|,;\n]/)[0].trim().slice(0,80) : '',
          company: (u.company||'').replace(/^@/,''),
          location: u.location || '',
          summary: u.bio || '',
          skills: extractSkills(u.bio || ''),
          email: u.email || '',
          github: u.html_url || '',
          portfolioUrl: blog && !blog.includes('linkedin.com') ? blog : '',
          avatarUrl: u.avatar_url,
          source: 'GitHub'
        }));
      }
      log('Scout', `GitHub: ${recent.length} recently active users`, 'info');
    } else { log('Scout', `GitHub HTTP ${res.status}`, 'warn'); }
  }catch(e){ log('Scout', `GitHub error: ${e.message}`, 'warn'); }

  log('Scout', `Sourced ${collected.length} candidates for "${need.title}" (deduped against existing pool).`, 'success');
  return collected;
}

/* ════════════════════════════════════════════════════════════════════
   AGENT 4 — THE VALIDATOR (GitHub repo analysis → validation history)
   Writes a NEW row to candidate_validations each pass.
   ════════════════════════════════════════════════════════════════════ */
const LANG_SKILL = {
  'JavaScript':['JavaScript','React','Node.js','Vue','Express','Next.js'],
  'TypeScript':['TypeScript','React','Angular','Node.js','Next.js'],
  'Python':['Python','Django','FastAPI','Flask','TensorFlow','Pandas'],
  'Java':['Java','Spring Boot','Kafka'],
  'Go':['Go','gRPC','Docker'],
  'Rust':['Rust','WebAssembly'],
  'Ruby':['Ruby','Rails'],
  'C++':['C++'],
  'C#':['C#','.NET'],
  'PHP':['PHP','Laravel'],
  'Swift':['Swift','iOS'],
  'Kotlin':['Kotlin','Android'],
};
async function runValidator(candidateIds){
  const ids = candidateIds && candidateIds.length ? candidateIds : DB.candidates.map(c=>c.id);
  log('Validator', `Validating ${ids.length} candidate(s) via GitHub…`, 'running');
  let validated = 0;
  for(const id of ids){
    const c = DB.candidates.find(x => x.id === id);
    if(!c) continue;
    if(!c.github){
      createValidation(id, {tier:'Insufficient Data', proficiency:{}, evidenceNotes:'No GitHub URL'});
      continue;
    }
    try{
      const username = c.github.replace(/.*github\.com\//,'').replace(/\/$/,'');
      if(!username){ createValidation(id, {tier:'Insufficient Data', proficiency:{}, evidenceNotes:'Bad GitHub URL'}); continue; }
      const res = await fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=5`);
      if(!res.ok){ createValidation(id, {tier:'Insufficient Data', proficiency:{}, evidenceNotes:`GitHub HTTP ${res.status}`}); continue; }
      const repos = await res.json();
      if(!repos.length){ createValidation(id, {tier:'Profile-Based', proficiency:{}, evidenceNotes:'No public repos'}); continue; }

      const langCount = {};
      let totalStars = 0, totalForks = 0, hasRecent = false;
      const tenDaysAgo = new Date(Date.now() - 10*24*60*60*1000);
      for(const r of repos){
        if(r.language) langCount[r.language] = (langCount[r.language]||0) + 1;
        totalStars += (r.stargazers_count||0);
        totalForks += (r.forks_count||0);
        if(new Date(r.pushed_at) >= tenDaysAgo) hasRecent = true;
      }
      const proficiency = {};
      Object.entries(langCount).sort((a,b)=>b[1]-a[1]).forEach(([lang,count])=>{
        const pct = Math.round((count/repos.length)*100);
        const mapped = LANG_SKILL[lang] || [lang];
        mapped.forEach(skill => {
          proficiency[skill] = Math.max(proficiency[skill]||0, Math.min(pct + Math.min(totalStars*2, 20), 100));
        });
      });
      let tier = 'Insufficient Data';
      if(Object.keys(proficiency).length >= 2 && hasRecent && totalStars >= 1) tier = 'Verified Active';
      else if(Object.keys(proficiency).length >= 1) tier = 'Profile-Based';
      createValidation(id, {
        tier, proficiency,
        githubStats: {repos: repos.length, stars: totalStars, forks: totalForks, hasRecent},
        evidenceNotes: `Pulled ${repos.length} repos`
      });
      validated++;
    }catch(e){
      createValidation(id, {tier:'Insufficient Data', proficiency:{}, evidenceNotes: `Error: ${e.message}`});
    }
  }
  const verified = DB.candidates.filter(c => latestValidation(c.id)?.tier === 'Verified Active').length;
  log('Validator', `Validated ${validated}/${ids.length}; ${verified} now Verified Active.`, 'success');
}

/* ════════════════════════════════════════════════════════════════════
   AGENT 5 — THE MATCHMAKER (need × candidate weighted scoring)
   Stores ALL candidates including <70 with tier=Drop (hidden by default).
   Weights: Skills 35 / Seniority 20 / Location 15 / Availability 15 / Validation 15
   ════════════════════════════════════════════════════════════════════ */
function scoreCandidateAgainstNeed(c, need){
  const norm = s => (s||'').toLowerCase().replace(/[^a-z0-9+#]/g,'');
  const cSkills = new Set((c.skills||[]).map(norm));
  const reqSkills = (need.requiredSkills||[]);
  const matched = reqSkills.filter(s => cSkills.has(norm(s)));
  const missing = reqSkills.filter(s => !cSkills.has(norm(s)));
  const reasons = [];

  // 1. Skills 35% (proficiency-weighted if a validation exists)
  const val = latestValidation(c.id);
  let skillRaw = 0;
  if(reqSkills.length){
    if(val && val.proficiency && Object.keys(val.proficiency).length){
      const profScores = matched.map(s => {
        const key = Object.keys(val.proficiency).find(k => norm(k) === norm(s));
        return key ? (val.proficiency[key]/100) : 0.5;
      });
      skillRaw = profScores.length ? (profScores.reduce((a,b)=>a+b,0) / reqSkills.length) * 100 : 0;
    } else {
      skillRaw = (matched.length / reqSkills.length) * 100;
    }
  } else { skillRaw = 50; }
  const skillScore = Math.min(skillRaw, 100) * 0.35;
  if(matched.length) reasons.push(`Matches ${matched.length}/${reqSkills.length} required skills: ${matched.join(', ')}${val?' (proficiency-weighted)':''}`);

  // 2. Seniority 20% (string match between need.seniority and candidate currentTitle)
  const senOrder = ['Junior','Mid','Senior','Staff','Principal','Director'];
  const cSenIdx = senOrder.findIndex(s => (c.currentTitle||'').toLowerCase().includes(s.toLowerCase()));
  const nSenIdx = senOrder.indexOf(need.seniority || 'Mid');
  let senRaw = 50;
  if(cSenIdx >= 0 && nSenIdx >= 0){
    const diff = Math.abs(cSenIdx - nSenIdx);
    senRaw = diff === 0 ? 100 : diff === 1 ? 75 : diff === 2 ? 45 : 20;
    if(diff === 0) reasons.push(`Seniority match: ${need.seniority}`);
    else if(diff === 1) reasons.push(`Adjacent seniority (${senOrder[cSenIdx]} vs ${need.seniority})`);
  }
  const seniorityScore = senRaw * 0.20;

  // 3. Location 15%
  const cLoc = (c.location||'').toLowerCase();
  const pLoc = (need.location||'').toLowerCase();
  let locRaw = 30;
  if(need.locationType === 'Remote' || cLoc.includes('remote')){ locRaw = 100; reasons.push('Remote-friendly'); }
  else if(pLoc && cLoc && (cLoc.includes(pLoc) || pLoc.includes(cLoc))){ locRaw = 100; reasons.push(`Location match: ${c.location}`); }
  const locationScore = locRaw * 0.15;

  // 4. Availability 15% — proxy via "last active" / having github / recent push
  let availRaw = 50;
  if(val?.githubStats?.hasRecent){ availRaw = 90; reasons.push('Active in last 10 days'); }
  else if(c.source === 'GitHub' || c.source === 'LinkedIn') availRaw = 65;
  const availScore = availRaw * 0.15;

  // 5. Validation 15%
  const tierName = val?.tier || 'Not Validated';
  let valRaw = 20;
  if(tierName === 'Verified Active'){ valRaw = 100; reasons.push('Verified Active on GitHub'); }
  else if(tierName === 'Profile-Based'){ valRaw = 60; reasons.push('Profile-based verification'); }
  const valScore = valRaw * 0.15;

  const total = Math.min(Math.round(skillScore + seniorityScore + locationScore + availScore + valScore), 100);
  if(!reasons.length) reasons.push('Broad skill set aligns with role');
  return {
    score: total,
    matchedSkills: matched,
    missingSkills: missing,
    reasoning: reasons,
  };
}

async function runMatchmaker(needId){
  const need = DB.hiring_needs.find(n => n.id === needId);
  if(!need){ log('Matchmaker', 'Need not found.', 'error'); return []; }
  if(!DB.candidates.length){ log('Matchmaker', 'No candidates in pool — run Scout first.', 'warn'); return []; }
  log('Matchmaker', `Scoring ${DB.candidates.length} candidates against "${need.title}"…`, 'running');

  const scored = DB.candidates.map(c => ({c, ...scoreCandidateAgainstNeed(c, need)}));
  scored.sort((a,b) => b.score - a.score);
  scored.forEach((entry, i) => {
    const tier = tierFromScore(entry.score);
    createOrUpdateMatch({
      needId,
      candidateId: entry.c.id,
      score: entry.score,
      tier,
      matchedSkills: entry.matchedSkills,
      missingSkills: entry.missingSkills,
      reasoning: entry.reasoning,
      rank: i + 1,
    });
  });
  const visible = DB.matches.filter(m => m.needId === needId && m.tier !== 'Drop').length;
  const dropped = DB.matches.filter(m => m.needId === needId && m.tier === 'Drop').length;
  log('Matchmaker', `Built shortlist for "${need.title}": ${visible} visible · ${dropped} dropped (<70).`, 'success');
}

/* ════════════════════════════════════════════════════════════════════
   AGENT 6 — THE COMPOSER (draft outreach)
   Templates for shortlist-pitch and warm-intro (no spammy tone).
   ════════════════════════════════════════════════════════════════════ */
function topSkills(matchIds, limit=3){
  const skills = {};
  for(const mid of matchIds){
    const m = DB.matches.find(x => x.id === mid);
    if(!m) continue;
    for(const s of (m.matchedSkills||[])){ skills[s] = (skills[s]||0) + 1; }
  }
  return Object.entries(skills).sort((a,b)=>b[1]-a[1]).slice(0, limit).map(([s])=>s);
}
function composeShortlistPitch(manager, need, matchIds){
  const company = DB.companies.find(c => c.id === need.companyId);
  const first = (manager.name||'').split(' ')[0] || 'there';
  const skills = topSkills(matchIds, 3);
  const skillStr = skills.length ? skills.join(', ') : (need.requiredSkills||[]).slice(0,3).join(', ');
  const subject = `Re: ${need.title}${company ? ` at ${company.name}` : ''} — vetted shortlist`;
  const body =
`Hi ${first},

I noticed your team may be hiring for ${need.title}${company ? ` at ${company.name}` : ''}. We recently identified and vetted a small group of candidates with experience in ${skillStr || 'the skill areas you need'}.

If filling this role is still a priority, I'd be happy to share how Sola Scholar can help you review qualified matches faster — happy to send over a one-page summary of the top three.

Best,
${DB.users.find(u=>u.role==='admin')?.name || 'The Sola Scholar team'}`;
  return {subject, body};
}
function composeWarmIntro(manager){
  const company = DB.companies.find(c => c.id === manager.companyId);
  const first = (manager.name||'').split(' ')[0] || 'there';
  const subject = `Hello from Sola Scholar — talent partner for ${company?.name || 'your team'}`;

`Hi ${first},

We work with ${manager.roleCategory && manager.roleCategory !== 'Other' ? manager.roleCategory.replace(/-/g,' ').toLowerCase() + 's' : 'engineering and security leaders'} at companies like ${company?.name || 'yours'} to surface vetted, demand-first shortlists — only when the need is real.

If hiring is on your roadmap in the next quarter, I'd love a 15-minute intro to learn what you're prioritising. No pitch, just listening first.

Best,
${DB.users.find(u=>u.role==='admin')?.name || 'The Sola Scholar team'}`;
  return {subject, body};
}

async function runComposer({needId, managerId, matchIds=[], kind}){
  const manager = DB.hiring_managers.find(m => m.id === managerId);
  if(!manager){ log('Composer', 'Manager not found.', 'error'); return null; }
  const resolvedKind = kind || (needId ? 'shortlist-pitch' : 'warm-intro');
  let drafted;
  if(resolvedKind === 'shortlist-pitch'){
    const need = DB.hiring_needs.find(n => n.id === needId);
    if(!need){ log('Composer', 'Need not found for shortlist pitch.', 'error'); return null; }
    drafted = composeShortlistPitch(manager, need, matchIds);
  } else {
    drafted = composeWarmIntro(manager);
  }
  const o = createOutreach({
    managerId, needId: resolvedKind === 'warm-intro' ? null : needId,
    matchIds: resolvedKind === 'warm-intro' ? [] : matchIds,
    channel: 'email', subject: drafted.subject, body: drafted.body, kind: resolvedKind
  });
  log('Composer', `${resolvedKind === 'warm-intro' ? 'Warm intro' : 'Shortlist pitch'} drafted for ${manager.name}.`, 'success');
  return o;
}

/* ════════════════════════════════════════════════════════════════════
   AIRTABLE SYNC (optional mirror for the 7 tables)
   ════════════════════════════════════════════════════════════════════ */
async function airtablePush(tableName, records){
  const keys = getKeys();
  if(!keys.airtableKey || !keys.airtableBase){ return {pushed:0, skipped: records.length, reason:'Airtable not configured'}; }
  if(!records.length) return {pushed:0, skipped:0};
  const url = `https://api.airtable.com/v0/${keys.airtableBase}/${encodeURIComponent(tableName)}`;
  let pushed = 0;
  for(let i=0; i<records.length; i+=10){
    const batch = records.slice(i, i+10).map(fields => ({fields}));
    try{
      const res = await fetch(url, {
        method:'POST',
        headers:{'Authorization':`Bearer ${keys.airtableKey}`,'Content-Type':'application/json'},
        body: JSON.stringify({records: batch, typecast: true})
      });
      if(res.ok){ pushed += batch.length; }
      else { const err = await res.json().catch(()=>({})); throw new Error(err.error?.message || `HTTP ${res.status}`); }
    }catch(e){
      return {pushed, skipped: records.length - pushed, error: e.message};
    }
  }
  return {pushed, skipped: 0};
}
async function syncAllToAirtable(){
  const keys = getKeys();
  if(!keys.airtableKey || !keys.airtableBase){ log('Airtable', 'Not configured — add token + base ID in Settings.', 'warn'); return; }
  log('Airtable', 'Syncing all tables…', 'running');
  const results = [];

  // Companies
  results.push(['Companies', await airtablePush(keys.airtableCompanies, DB.companies.map(c => ({
    'Name': c.name, 'Domain': c.domain, 'Industry': c.industry, 'Size': c.size, 'HQ Location': c.hqLocation,
    'Hiring Signals': (c.hiringSignals||[]).join(', '), 'Notes': c.notes,
  })))]);
  // Managers
  results.push(['Hiring Managers', await airtablePush(keys.airtableManagers, DB.hiring_managers.map(m => {
    const co = DB.companies.find(c=>c.id===m.companyId);
    return {
      'Name': m.name, 'Title': m.title, 'Company': co?.name||'', 'Role Category': m.roleCategory,
      'Email': m.email, 'Email Confidence': m.emailConfidence, 'LinkedIn': m.linkedinUrl,
      'Status': m.status, 'Source': m.source,
    };
  }))]);
  // Needs
  results.push(['Hiring Needs', await airtablePush(keys.airtableNeeds, DB.hiring_needs.map(n => {
    const co = DB.companies.find(c=>c.id===n.companyId);
    const mgr = DB.hiring_managers.find(m=>m.id===n.managerId);
    return {
      'Title': n.title, 'Company': co?.name||'', 'Manager': mgr?.name||'',
      'Description': (n.description||'').slice(0,500), 'Required Skills': (n.requiredSkills||[]).join(', '),
      'Tools': (n.tools||[]).join(', '), 'Seniority': n.seniority, 'Location Type': n.locationType,
      'Location': n.location, 'Salary Range': n.salaryRange, 'Source URL': n.sourceUrl,
      'Confirmed': !!n.confirmed, 'Urgency': n.urgency, 'Status': n.status,
    };
  }))]);
  // Candidates
  results.push(['Candidates', await airtablePush(keys.airtableCandidates, DB.candidates.map(c => ({
    'Name': c.name, 'Current Title': c.currentTitle, 'Current Company': c.currentCompany,
    'Location': c.location, 'Skills': (c.skills||[]).join(', '),
    'GitHub': c.github, 'LinkedIn': c.linkedinUrl, 'Portfolio': c.portfolioUrl,
    'Email': c.email, 'Source': c.source, 'Summary': (c.summary||'').slice(0,500),
  })))]);
  // Validations
  results.push(['Validations', await airtablePush(keys.airtableValidations, DB.candidate_validations.map(v => {
    const c = DB.candidates.find(x=>x.id===v.candidateId);
    return {
      'Candidate': c?.name||'', 'Validated At': v.validatedAt, 'Tier': v.tier,
      'Proficiency': JSON.stringify(v.proficiency||{}),
      'Repo Count': v.githubStats?.repos||0, 'Stars': v.githubStats?.stars||0,
      'Notes': v.evidenceNotes,
    };
  }))]);
  // Matches
  results.push(['Matches', await airtablePush(keys.airtableMatches, DB.matches.map(m => {
    const c = DB.candidates.find(x=>x.id===m.candidateId);
    const n = DB.hiring_needs.find(x=>x.id===m.needId);
    return {
      'Candidate': c?.name||'', 'Need': n?.title||'',
      'Score': m.score, 'Tier': m.tier, 'Rank': m.rank,
      'Matched Skills': (m.matchedSkills||[]).join(', '),
      'Missing Skills': (m.missingSkills||[]).join(', '),
      'Reasoning': (m.reasoning||[]).join(' | '), 'Status': m.status,
    };
  }))]);
  // Outreach
  results.push(['Outreach', await airtablePush(keys.airtableOutreach, DB.outreach.map(o => {
    const mgr = DB.hiring_managers.find(x=>x.id===o.managerId);
    const n = DB.hiring_needs.find(x=>x.id===o.needId);
    return {
      'Manager': mgr?.name||'', 'Need': n?.title||'',
      'Kind': o.kind, 'Channel': o.channel, 'Subject': o.subject,
      'Body': o.body, 'Status': o.status, 'Sent At': o.sentAt||'',
      'Replied At': o.repliedAt||'', 'Reply': o.replyText||'',
    };
  }))]);

  for(const [name, r] of results){
    if(r.error) log('Airtable', `${name}: ${r.pushed} pushed, error: ${r.error}`, 'warn');
    else if(r.reason) log('Airtable', `${name}: skipped (${r.reason})`, 'info');
    else log('Airtable', `${name}: ${r.pushed} synced`, 'success');
  }
}

const Dashboard = ({setPage, refresh, bump}) => {
  const [running, setRunning] = useState(null);
  const [industry, setIndustry] = useState('');
  const [logs, setLogs] = useState([...DB.logs]);
  useEffect(() => { setLogs([...DB.logs]); }, [refresh]);

  const stats = {
    companies: DB.companies.length,
    managers: DB.hiring_managers.length,
    needs: DB.hiring_needs.length,
    confirmedNeeds: DB.hiring_needs.filter(n=>n.confirmed).length,
    candidates: DB.candidates.length,
    matches: DB.matches.filter(m=>m.tier!=='Drop').length,
    outreach: DB.outreach.length,
  };

  const runConnectorAction = async () => {
    setRunning('connector');
    try { await runConnector({industry}); bump(); }
    finally { setRunning(null); setLogs([...DB.logs]); }
  };

  const STATS = [
    {label:'Companies',  val:stats.companies,  icon:'🏢', c:'text-gray-700 bg-gray-100',     pg:'companies'},
    {label:'Managers',   val:stats.managers,   icon:'🤝', c:'text-violet-600 bg-violet-50',  pg:'hiring-managers'},
    {label:'Needs',      val:`${stats.confirmedNeeds}/${stats.needs}`, icon:'🎯', c:'text-rose-600 bg-rose-50', pg:'hiring-needs', sub:'confirmed'},
    {label:'Candidates', val:stats.candidates, icon:'👤', c:'text-indigo-600 bg-indigo-50',  pg:'candidates'},
    {label:'Matches',    val:stats.matches,    icon:'⭐', c:'text-amber-600 bg-amber-50',    pg:'matches'},
    {label:'Outreach',   val:stats.outreach,   icon:'✉️', c:'text-blue-600 bg-blue-50',      pg:'outreach'},
  ];
  const lc = {info:'text-gray-400', running:'text-indigo-500', success:'text-emerald-500', warn:'text-amber-500', error:'text-red-500'};
  const lb = {info:'●', running:'⟳', success:'✓', warn:'⚠', error:'✗'};
  const keys = getKeys();
  const configCount = [keys.firecrawl, keys.apollo, keys.airtableKey].filter(Boolean).length;

  return (
    <div className="p-8 fade-in">
      <div className="flex items-center justify-between mb-8">
        <div>
          <h1 className="text-2xl font-bold text-gray-900">Dashboard</h1>
          <p className="text-gray-500 text-sm mt-0.5">Demand-first pipeline · Managers → Needs → Candidates → Matches → Outreach</p>
        </div>
        <div className="flex items-center gap-3">
          {configCount<3 && <button onClick={()=>setPage('settings')}
            className="flex items-center gap-1.5 text-xs bg-amber-50 border border-amber-200 text-amber-700 px-3 py-2 rounded-xl hover:bg-amber-100">
            ⚙️ {configCount}/3 APIs connected
          </button>}
        </div>
      </div>

      <div className="grid grid-cols-6 gap-4 mb-8">
        {STATS.map(s => (
          <div key={s.label} onClick={()=>setPage(s.pg)}
               className="bg-white rounded-xl border border-gray-100 shadow-sm p-5 text-center hover:shadow-md cursor-pointer">
            <div className={`w-10 h-10 rounded-xl ${s.c} flex items-center justify-center text-lg mx-auto mb-2`}>{s.icon}</div>
            <div className="text-2xl font-bold text-gray-900">{s.val}</div>
            <div className="text-gray-500 text-xs mt-1 font-medium">{s.label}{s.sub?` ${s.sub}`:''}</div>
          </div>
        ))}
      </div>

      <h2 className="font-bold text-gray-900 mb-3">Pipeline</h2>
      <div className="grid grid-cols-3 gap-4 mb-8">
        {PIPELINE.map(p => {
          const cc = COLORCLS[p.color];
          return (
            <div key={p.key} className={`rounded-2xl border-2 p-5 ${cc.bg} ${cc.border}`}>
              <div className="flex items-start gap-3 mb-3">
                <div className={`w-10 h-10 rounded-xl ${cc.icon} flex items-center justify-center text-xl flex-shrink-0`}>{p.icon}</div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap">
                    <Badge cls={cc.badge}>Step {p.n}</Badge>
                  </div>
                  <h3 className="font-bold text-gray-900 text-sm mt-1">{p.name}</h3>
                </div>
              </div>
              <p className="text-gray-600 text-xs mb-3 leading-relaxed">{p.desc}</p>
              {p.key === 'connector' ? (
                <>
                  <input value={industry} onChange={e=>setIndustry(e.target.value)} placeholder={p.input}
                         className="w-full border border-gray-200 rounded-lg px-3 py-2 text-xs mb-2 bg-white focus:outline-none focus:ring-2 focus:ring-violet-200"/>
                  <button onClick={runConnectorAction} disabled={running==='connector'}
                          className={`w-full text-white text-sm py-2 rounded-xl font-semibold ${cc.btn} disabled:opacity-50 flex items-center justify-center gap-2`}>
                    {running==='connector' ? <><Spinner/> Working…</> : `Run ${p.name}`}
                  </button>
                </>
              ) : (
                <p className="text-xs text-gray-500 italic">{p.perEntity || 'Run from the relevant page'}</p>
              )}
            </div>
          );
        })}
      </div>

      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
        <h2 className="font-bold text-gray-900 mb-4">Activity Log</h2>
        {!logs.length ? (
          <p className="text-gray-400 text-sm text-center py-10">No activity yet — start by running the Connector</p>
        ) : (
          <div className="space-y-2 max-h-96 overflow-y-auto">
            {logs.slice(0, 30).map(l => (
              <div key={l.id} className="flex items-start gap-3 text-sm py-1 border-b border-gray-50 last:border-0">
                <span className={`font-mono text-xs mt-0.5 flex-shrink-0 ${lc[l.status]||'text-gray-400'}`}>{lb[l.status]||'●'}</span>
                <div className="flex-1 min-w-0">
                  <span className="font-semibold text-gray-700 text-xs">{l.agent}</span>
                  <span className="text-gray-300 mx-1.5">·</span>
                  <span className="text-gray-600 text-xs">{l.message}</span>
                </div>
                <span className="text-gray-300 text-xs whitespace-nowrap flex-shrink-0">{new Date(l.ts).toLocaleTimeString()}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
};

const CompaniesPage = ({refresh, bump, navigateTo}) => {

const HiringManagersPage = ({refresh, bump, navigateTo}) => {
  const [managers, setM] = useState([...DB.hiring_managers]);
  const [loading, setL] = useState(false);
  const [industry, setI] = useState('');
  const [filter, setF] = useState('');
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({name:'', title:'', companyName:'', email:'', linkedinUrl:'', industry:''});
  const [detecting, setDetecting] = useState(null);
  const [composing, setComposing] = useState(null);
  useEffect(() => { setM([...DB.hiring_managers]); }, [refresh]);

  const run = async () => {
    setL(true);
    try { await runConnector({industry}); bump(); }
    finally { setL(false); }
  };
  const add = () => {
    if(!form.name || !form.companyName) return alert('Name and company are required');
    if(!form.email || !form.email.includes('@')) return alert('Valid email required (no fabricated emails).');
    const co = findOrCreateCompany({name: form.companyName, industry: form.industry});
    findOrCreateManager({
      name: form.name, title: form.title, companyId: co.id,
      email: form.email, emailConfidence: 'verified',
      linkedinUrl: form.linkedinUrl, source: 'Manual',
      roleCategory: categorizeManagerTitle(form.title),
    });
    setForm({name:'', title:'', companyName:'', email:'', linkedinUrl:'', industry:''});
    setShowAdd(false); bump();
  };
  const detect = async (managerId) => {
    const m = DB.hiring_managers.find(x => x.id === managerId);
    if(!m) return;
    setDetecting(managerId);
    try { await runNeedDetector(m.companyId); bump(); }
    finally { setDetecting(null); }
  };
  const composeWarmIntro = async (managerId) => {
    setComposing(managerId);
    try {
      await runComposer({managerId, kind:'warm-intro'});
      bump();
      navigateTo('outreach');
    } finally { setComposing(null); }
  };
  const setStatus = (id, status) => {
    const m = DB.hiring_managers.find(x => x.id === id);
    if(m){ m.status = status; saveDB(); bump(); }
  };

  const filtered = managers.filter(m => {
    if(!filter) return true;
    const co = DB.companies.find(c => c.id === m.companyId)?.name || '';
    return [m.name, m.title, co].some(s => s?.toLowerCase().includes(filter.toLowerCase()));
  });

  return (
    <div className="p-8 fade-in">
      <div className="flex items-center gap-3 mb-6">
        <div className="w-11 h-11 rounded-xl bg-violet-100 flex items-center justify-center text-2xl">🤝</div>
        <div>
          <h1 className="text-2xl font-bold text-gray-900">Hiring Managers</h1>
          <p className="text-violet-600 text-sm font-medium">Step 1 · The Connector · verified contacts only</p>
        </div>
      </div>

      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 mb-6">
        <div className="flex gap-3 flex-wrap">
          <input className="flex-1 min-w-48 border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-violet-200"
                 placeholder="Industry (e.g. Cloud Security, FinTech)" value={industry} onChange={e=>setI(e.target.value)}/>
          <button onClick={run} disabled={loading}
                  className="bg-violet-600 hover:bg-violet-700 text-white px-5 py-2.5 rounded-xl text-sm font-semibold disabled:opacity-50 flex items-center gap-2 whitespace-nowrap">
            {loading ? <><Spinner/> Connecting…</> : '🤝 Run The Connector'}
          </button>
          <button onClick={()=>setShowAdd(!showAdd)} className="bg-gray-100 hover:bg-gray-200 text-gray-700 px-5 py-2.5 rounded-xl text-sm font-semibold whitespace-nowrap">
            + Add Manually
          </button>
        </div>
        {showAdd && (
          <div className="mt-3 p-3 border border-violet-200 bg-violet-50 rounded-xl">
            <div className="grid grid-cols-2 gap-2 mb-2">
              <input className="border border-gray-200 rounded-lg px-3 py-2 text-sm" placeholder="Name *" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/>
              <input className="border border-gray-200 rounded-lg px-3 py-2 text-sm" placeholder="Title (e.g. Director of Cloud Security)" value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))}/>
              <input className="border border-gray-200 rounded-lg px-3 py-2 text-sm" placeholder="Company *" value={form.companyName} onChange={e=>setForm(p=>({...p,companyName:e.target.value}))}/>
              <input className="border border-gray-200 rounded-lg px-3 py-2 text-sm" placeholder="Industry" value={form.industry} onChange={e=>setForm(p=>({...p,industry:e.target.value}))}/>
              <input className="border border-gray-200 rounded-lg px-3 py-2 text-sm" placeholder="Email * (real, no auto-fabrication)" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))}/>
              <input className="border border-gray-200 rounded-lg px-3 py-2 text-sm" placeholder="LinkedIn URL" value={form.linkedinUrl} onChange={e=>setForm(p=>({...p,linkedinUrl:e.target.value}))}/>
            </div>
            <div className="flex gap-2">
              <button onClick={add} className="flex-1 bg-violet-600 hover:bg-violet-700 text-white px-3 py-2 rounded-lg text-xs font-semibold">Add Manager</button>
              <button onClick={()=>setShowAdd(false)} className="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-2 rounded-lg text-xs font-semibold">Cancel</button>
            </div>
          </div>

/* ════════════════════════════════════════════════════════════════════

const HiringNeedsPage = ({refresh, bump, navigateTo, query}) => {
  const [needs, setN] = useState([...DB.hiring_needs]);
  const [filter, setF] = useState('all');
  const [search, setS] = useState('');
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({title:'', companyName:'', skills:'', seniority:'Mid', locationType:'Remote', location:'', urgency:'Medium', sourceUrl:'', description:''});
  const [scouting, setScouting] = useState(null);
  const [matching, setMatching] = useState(null);
  useEffect(() => { setN([...DB.hiring_needs]); }, [refresh]);

  const companyFilter = query?.companyId;

  const add = () => {
    if(!form.title || !form.companyName) return alert('Title and company are required');
    const co = findOrCreateCompany({name: form.companyName});
    createNeed({
      companyId: co.id,
      title: form.title,
      description: form.description,
      requiredSkills: form.skills ? form.skills.split(',').map(s=>s.trim()).filter(Boolean) : [],
      seniority: form.seniority,
      locationType: form.locationType,
      location: form.location,
      urgency: form.urgency,
      sourceUrl: form.sourceUrl,
      confirmed: true,  // manually added → confirmed by default
      confirmationEvidence: form.sourceUrl ? [form.sourceUrl] : [],
    });
    setForm({title:'', companyName:'', skills:'', seniority:'Mid', locationType:'Remote', location:'', urgency:'Medium', sourceUrl:'', description:''});
    setShowAdd(false); bump();
  };
  const confirm = (id) => {
    const n = DB.hiring_needs.find(x => x.id === id);
    if(n){ n.confirmed = true; saveDB(); bump(); }
  };
  const unconfirm = (id) => {
    const n = DB.hiring_needs.find(x => x.id === id);
    if(n){ n.confirmed = false; saveDB(); bump(); }
  };
  const del = (id) => {
    if(!confirm){ }
    const i = DB.hiring_needs.findIndex(x => x.id === id);
    if(i>-1){ DB.hiring_needs.splice(i,1); saveDB(); bump(); }
  };
  const editField = (id, field, value) => {
    const n = DB.hiring_needs.find(x => x.id === id);
    if(n){ n[field] = value; saveDB(); bump(); }
  };
  const scout = async (needId) => {
    setScouting(needId);
    try { await runScout(needId); bump(); }
    finally { setScouting(null); }
  };
  const match = async (needId) => {
    setMatching(needId);
    try { await runMatchmaker(needId); bump(); navigateTo('matches', {needId}); }
    finally { setMatching(null); }
  };

  const filtered = needs.filter(n => {
    if(companyFilter && n.companyId !== companyFilter) return false;

    if(filter === 'unconfirmed' && n.confirmed) return false;
    if(filter === 'open' && n.status !== 'open') return false;
    if(search){
      const co = DB.companies.find(c => c.id === n.companyId)?.name || '';
      if(![n.title, co, ...(n.requiredSkills||[])].some(s => String(s).toLowerCase().includes(search.toLowerCase()))) return false;
    }
    return true;

  return (
    <div className="p-8 fade-in">

        <div className="w-11 h-11 rounded-xl bg-rose-100 flex items-center justify-center text-2xl">🎯</div>
        <div>
          <h1 className="text-2xl font-bold text-gray-900">Hiring Needs</h1>
          <p className="text-rose-600 text-sm font-medium">Step 2 · The Need Detector · confirm before sourcing</p>
        </div>
      </div>

      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 mb-6">
        <div className="flex gap-3 flex-wrap items-center">
          <input className="flex-1 min-w-48 border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-rose-200"
                 placeholder="Search title, company, or skill…" value={search} onChange={e=>setS(e.target.value)}/>
          <div className="flex gap-1">
            {['all','confirmed','unconfirmed','open'].map(f => (
              <button key={f} onClick={()=>setF(f)} className={`px-3 py-1.5 rounded-lg text-xs font-medium capitalize ${filter===f?'bg-rose-600 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>{f}</button>
            ))}
          </div>
          <button onClick={()=>setShowAdd(!showAdd)} className="bg-gray-100 hover:bg-gray-200 text-gray-700 px-5 py-2.5 rounded-xl text-sm font-semibold whitespace-nowrap">+ Add Manually</button>
        </div>

   ════════════════════════════════════════════════════════════════════ */
const CandidatesPage = ({refresh, bump}) => {
  const [candidates, setC] = useState([...DB.candidates]);
  const [filter, setF] = useState('');
  const [tierFilter, setTF] = useState('all');
  const [validating, setV] = useState(false);
  useEffect(() => { setC([...DB.candidates]); }, [refresh]);

  const validateAll = async () => {
    setV(true);
    try { await runValidator(); bump(); }
    finally { setV(false); }
  };
  const del = (id) => {
    const i = DB.candidates.findIndex(x => x.id === id);
    if(i>-1){
      DB.candidates.splice(i, 1);
      // also clear validations + matches for this candidate
      DB.candidate_validations = DB.candidate_validations.filter(v => v.candidateId !== id);
      DB.matches = DB.matches.filter(m => m.candidateId !== id);
      saveDB(); bump();
    }
  };

  const filtered = candidates.filter(c => {
    if(filter && ![c.name, c.currentTitle, c.currentCompany, ...(c.skills||[])].some(s => String(s||'').toLowerCase().includes(filter.toLowerCase()))) return false;
    if(tierFilter !== 'all'){
      const v = latestValidation(c.id);
      if(tierFilter === 'unvalidated' && v) return false;
      if(tierFilter !== 'unvalidated' && (!v || v.tier !== tierFilter)) return false;
    }
    return true;
  });
  const counts = {
    all: candidates.length,
    'Verified Active': candidates.filter(c => latestValidation(c.id)?.tier === 'Verified Active').length,
    'Profile-Based': candidates.filter(c => latestValidation(c.id)?.tier === 'Profile-Based').length,
    'Insufficient Data': candidates.filter(c => latestValidation(c.id)?.tier === 'Insufficient Data').length,
    unvalidated: candidates.filter(c => !latestValidation(c.id)).length,
  };

  return (
    <div className="p-8 fade-in">
      <div className="flex items-center gap-3 mb-6">
        <div className="w-11 h-11 rounded-xl bg-indigo-100 flex items-center justify-center text-2xl">👤</div>
        <div>
          <h1 className="text-2xl font-bold text-gray-900">Candidates</h1>
          <p className="text-indigo-600 text-sm font-medium">Steps 3 + 4 · Scout sources from a confirmed need · Validator checks GitHub</p>
        </div>
      </div>

      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 mb-6">
        <div className="flex gap-3 items-center flex-wrap">
          <button onClick={validateAll} disabled={validating || !candidates.length}
                  className="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl text-sm font-semibold disabled:opacity-50 flex items-center gap-2">
            {validating ? <><Spinner/> Validating…</> : `✅ Validate all (${candidates.length})`}
          </button>
          <input className="flex-1 min-w-48 border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-200"
                 placeholder="Filter by name, skill, or company…" value={filter} onChange={e=>setF(e.target.value)}/>
        </div>
        <div className="flex gap-2 mt-3 flex-wrap">
          {[['all','All'], ['Verified Active','Verified Active'], ['Profile-Based','Profile-Based'], ['Insufficient Data','Insufficient'], ['unvalidated','Unvalidated']].map(([v, lbl]) => (
            <button key={v} onClick={()=>setTF(v)} className={`px-3 py-1.5 rounded-lg text-xs font-medium ${tierFilter===v?'bg-indigo-600 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
              {lbl} ({counts[v]||0})

      </div>

      {!candidates.length ? (
        <Empty icon="🔍" title="No candidates yet" sub="Open a confirmed Hiring Need and click 'Source candidates'."/>
      ) : (
        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">

            return (

/* ════════════════════════════════════════════════════════════════════
   MATCHES PAGE
   ════════════════════════════════════════════════════════════════════ */
const MatchesPage = ({refresh, bump, navigateTo, query}) => {
  const [matches, setMx] = useState([...DB.matches]);
  const [showDrop, setShowDrop] = useState(false);
  const [needFilter, setNF] = useState(query?.needId || 'all');
  const [composing, setComposing] = useState(false);
  useEffect(() => { setMx([...DB.matches]); }, [refresh]);
  useEffect(() => { if(query?.needId) setNF(query.needId); }, [query?.needId]);

  const setStatus = (id, status) => {
    const m = DB.matches.find(x => x.id === id);
    if(m){ m.status = status; saveDB(); bump(); }
  };

  const filtered = matches.filter(m => {
    if(needFilter !== 'all' && m.needId !== needFilter) return false;
    if(!showDrop && m.tier === 'Drop') return false;
    return true;
  }).sort((a,b) => b.score - a.score);

  // Group by need
  const byNeed = filtered.reduce((acc, m) => {
    (acc[m.needId] = acc[m.needId] || []).push(m);
    return acc;
  }, {});

  const composeShortlist = async (needId) => {
    const need = DB.hiring_needs.find(n => n.id === needId);
    if(!need){ alert('Need not found'); return; }
    if(!need.managerId){
      // Try to find a manager at the same company
      const mgr = DB.hiring_managers.find(m => m.companyId === need.companyId);
      if(!mgr){ alert('Add a hiring manager for this company first.'); return; }
      need.managerId = mgr.id; saveDB();
    }
    const approved = DB.matches.filter(m => m.needId === needId && m.status === 'approved').map(m => m.id);
    if(!approved.length){ alert('Approve at least one match first (✓ button on a match).'); return; }
    setComposing(true);
    try {
      await runComposer({needId, managerId: need.managerId, matchIds: approved, kind:'shortlist-pitch'});
      bump();
      navigateTo('outreach');
    } finally { setComposing(false); }
  };

  return (
    <div className="p-8 fade-in">
      <div className="flex items-center justify-between mb-6">
        <div className="flex items-center gap-3">
          <div className="w-11 h-11 rounded-xl bg-amber-100 flex items-center justify-center text-2xl">⭐</div>
          <div>
            <h1 className="text-2xl font-bold text-gray-900">Matches</h1>
            <p className="text-amber-600 text-sm font-medium">Step 5 · Weighted scoring (Skills 35 / Seniority 20 / Location 15 / Availability 15 / Validation 15)</p>
          </div>
        </div>
        <label className="flex items-center gap-2 text-xs text-gray-600 bg-white border border-gray-200 px-3 py-2 rounded-xl">
          <input type="checkbox" checked={showDrop} onChange={e=>setShowDrop(e.target.checked)}/>
          Show dropped (&lt;70)
        </label>
      </div>

      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 mb-6">
        <div className="flex gap-3 items-center flex-wrap">
          <label className="text-xs text-gray-500 font-semibold">Filter by need:</label>
          <select value={needFilter} onChange={e=>setNF(e.target.value)}
                  className="border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white">
            <option value="all">All needs</option>
            {DB.hiring_needs.filter(n=>n.confirmed).map(n => {
              const co = DB.companies.find(c=>c.id===n.companyId)?.name;
              return <option key={n.id} value={n.id}>{n.title} — {co||'—'}</option>;
            })}
          </select>
        </div>
      </div>

      {!Object.keys(byNeed).length ? (
        <Empty icon="⭐" title="No matches yet" sub="Open a Hiring Need and click 'Build shortlist'."/>
      ) : (
        Object.entries(byNeed).map(([needId, items]) => {
          const need = DB.hiring_needs.find(n => n.id === needId);
          const co = DB.companies.find(c => c.id === need?.companyId);
          const approvedCount = items.filter(m => m.status === 'approved').length;
          return (
            <div key={needId} className="mb-8 fade-in">
              <div className="flex items-center justify-between mb-3 flex-wrap gap-3">
                <div className="flex items-center gap-3">
                  <h2 className="text-base font-bold text-gray-800">{co?.name || '—'} · {need?.title || '—'}</h2>
                  <span className="bg-gray-100 text-gray-500 text-xs px-2 py-0.5 rounded-full">{items.length} match{items.length!==1?'es':''}</span>
                </div>
                <button onClick={()=>composeShortlist(needId)} disabled={composing || !approvedCount}
                        title={!approvedCount ? 'Approve at least one match first' : ''}
                        className="bg-blue-600 hover:bg-blue-700 text-white text-xs px-4 py-2 rounded-xl font-semibold disabled:opacity-50 flex items-center gap-2">
                  {composing ? <><Spinner/> Drafting…</> : `✉️ Compose pitch (${approvedCount} approved)`}
                </button>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                {items.map(m => {
                  const c = DB.candidates.find(x => x.id === m.candidateId);
                  if(!c) return null;
                  return (
                    <div key={m.id} className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 hover:shadow-md">
                      <div className="flex items-start gap-3 mb-3">
                        <div className="relative flex-shrink-0">
                          <Avatar url={c.avatarUrl} name={c.name}/>
                          <span className="absolute -top-1 -right-1 w-6 h-6 rounded-full bg-gray-800 text-white flex items-center justify-center text-xs font-black">#{m.rank}</span>
                        </div>
                        <div className="flex-1 min-w-0">
                          <p className="font-bold text-gray-900 text-sm truncate">{c.name}</p>
                          <p className="text-gray-500 text-xs">{c.currentTitle}</p>
                          <div className="flex gap-1 mt-1 flex-wrap">
                            <Badge cls={matchTierColor(m.tier)}>{m.tier}</Badge>
                            <Badge cls={statusColor(m.status)}>{m.status}</Badge>
                          </div>
                        </div>
                      </div>
                      <div className="mb-3">
                        <div className="flex items-center justify-between text-xs mb-1.5">
                          <span className="text-gray-500 font-medium">Match score</span>
                          <span className="font-bold text-gray-800">{m.score}/100</span>
                        </div>
                        <div className="w-full bg-gray-100 rounded-full h-2"><div className={`h-2 rounded-full ${barColor(m.score)}`} style={{width:`${m.score}%`}}/></div>
                      </div>
                      {(m.matchedSkills||[]).length>0 && (
                        <div className="flex flex-wrap gap-1 mb-2">
                          {m.matchedSkills.slice(0,6).map(s => <Badge key={s} cls="bg-emerald-50 text-emerald-700">✓ {s}</Badge>)}
                        </div>
                      )}
                      {(m.missingSkills||[]).length>0 && (
                        <div className="flex flex-wrap gap-1 mb-2">
                          {m.missingSkills.slice(0,4).map(s => <Badge key={s} cls="bg-red-50 text-red-600">✗ {s}</Badge>)}
                        </div>
                      )}
                      <div className="mb-3 space-y-0.5">
                        {(m.reasoning||[]).slice(0,3).map((r,i) => <p key={i} className="text-xs text-gray-600">• {r}</p>)}
                      </div>
                      {m.status === 'proposed' ? (
                        <div className="flex gap-2">
                          <button onClick={()=>setStatus(m.id, 'approved')} className="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white text-xs py-2 rounded-xl font-semibold">✓ Approve</button>
                          <button onClick={()=>setStatus(m.id, 'rejected')} className="flex-1 bg-gray-100 hover:bg-red-50 text-gray-600 hover:text-red-600 text-xs py-2 rounded-xl font-semibold">✗ Reject</button>
                        </div>
                      ) : (
                        <button onClick={()=>setStatus(m.id, 'proposed')} className="w-full bg-gray-100 hover:bg-gray-200 text-gray-600 text-xs py-2 rounded-xl font-semibold">↺ Reset</button>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })
      )}
    </div>
  );
};

/* ════════════════════════════════════════════════════════════════════
   OUTREACH PAGE

const OutreachPage = ({refresh, bump}) => {
  const [items, setI] = useState([...DB.outreach]);
  const [filter, setF] = useState('all');
  const [editingId, setEditingId] = useState(null);
  const [editBody, setEditBody] = useState('');
  const [editSubject, setEditSubject] = useState('');
  useEffect(() => { setI([...DB.outreach]); }, [refresh]);

  const startEdit = (o) => {
    setEditingId(o.id);
    setEditSubject(o.subject);
    setEditBody(o.body);
  };
  const saveEdit = () => {
    const o = DB.outreach.find(x => x.id === editingId);
    if(o){ o.subject = editSubject; o.body = editBody; saveDB(); bump(); }
    setEditingId(null);
  };
  const setStatus = (id, status) => {
    const o = DB.outreach.find(x => x.id === id);
    if(!o) return;
    o.status = status;
    if(status === 'sent' && !o.sentAt) o.sentAt = now();
    if(status === 'replied' && !o.repliedAt) o.repliedAt = now();
    saveDB(); bump();
  };
  const setReply = (id, txt) => {
    const o = DB.outreach.find(x => x.id === id);
    if(o){ o.replyText = txt; saveDB(); bump(); }
  };
  const del = (id) => {
    const i = DB.outreach.findIndex(x => x.id === id);
    if(i>-1){ DB.outreach.splice(i, 1); saveDB(); bump(); }
  };
  const sendViaMailto = (o) => {
    const m = DB.hiring_managers.find(x => x.id === o.managerId);
    if(!m?.email){ alert('Manager has no email on file.'); return; }
    window.location.href = `mailto:${m.email}?subject=${encodeURIComponent(o.subject)}&body=${encodeURIComponent(o.body)}`;
    if(o.status === 'drafted') setStatus(o.id, 'sent');
  };

  const filtered = items.filter(o => {
    if(filter === 'all') return true;
    if(filter === 'shortlist') return o.kind === 'shortlist-pitch';
    if(filter === 'warm') return o.kind === 'warm-intro';
    return o.status === filter;
  }).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

  return (
    <div className="p-8 fade-in">
      <div className="flex items-center gap-3 mb-6">
        <div className="w-11 h-11 rounded-xl bg-blue-100 flex items-center justify-center text-2xl">✉️</div>
        <div>
          <h1 className="text-2xl font-bold text-gray-900">Outreach</h1>
          <p className="text-blue-600 text-sm font-medium">Step 6 · Drafted by Composer · review and send via your email client</p>
        </div>
      </div>

      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 mb-6">
        <div className="flex gap-2 flex-wrap">
          {['all','drafted','sent','replied','shortlist','warm'].map(f => (
            <button key={f} onClick={()=>setF(f)} className={`px-3 py-1.5 rounded-lg text-xs font-medium capitalize ${filter===f?'bg-blue-600 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
              {f === 'shortlist' ? 'Shortlist pitch' : f === 'warm' ? 'Warm intro' : f}
            </button>
          ))}
        </div>
      </div>

      {!items.length ? (
        <Empty icon="✉️" title="No outreach drafted yet" sub="From a manager card click 'Warm intro', or from Matches click 'Compose pitch'."/>
      ) : (
        <div className="space-y-3">
          {filtered.map(o => {
            const m = DB.hiring_managers.find(x => x.id === o.managerId);
            const co = m && DB.companies.find(c => c.id === m.companyId);
            const need = o.needId && DB.hiring_needs.find(n => n.id === o.needId);
            return (
              <div key={o.id} className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 fade-in">
                <div className="flex items-start justify-between gap-3 mb-3">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap mb-1">
                      <Badge cls={o.kind==='warm-intro' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}>
                        {o.kind === 'warm-intro' ? '🌡 Warm intro' : '⭐ Shortlist pitch'}
                      </Badge>
                      <Badge cls={statusColor(o.status)}>{o.status}</Badge>
                      <span className="text-xs text-gray-400">{fmtTime(o.createdAt)}</span>
                    </div>
                    <p className="text-sm font-bold text-gray-900">{m?.name || '—'} <span className="text-gray-500 font-normal">@ {co?.name || '—'}</span></p>
                    {need && <p className="text-xs text-gray-500">Re: {need.title}</p>}
                    {o.matchIds?.length>0 && <p className="text-xs text-gray-500">Pitching {o.matchIds.length} candidate{o.matchIds.length!==1?'s':''}</p>}
                  </div>
                  <button onClick={()=>{ if(window.confirm('Delete this outreach?')) del(o.id); }} className="text-red-400 hover:text-red-600 text-xs">🗑</button>
                </div>
                {editingId === o.id ? (
                  <div className="space-y-2 mb-3">
                    <input className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" value={editSubject} onChange={e=>setEditSubject(e.target.value)}/>
                    <textarea className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm font-mono" rows="8" value={editBody} onChange={e=>setEditBody(e.target.value)}/>
                    <div className="flex gap-2">
                      <button onClick={saveEdit} className="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white text-xs py-2 rounded-lg font-semibold">Save</button>
                      <button onClick={()=>setEditingId(null)} className="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 text-xs py-2 rounded-lg font-semibold">Cancel</button>
                    </div>
                  </div>
                ) : (
                  <div className="bg-gray-50 rounded-xl p-3 mb-3">
                    <p className="text-xs font-semibold text-gray-700 mb-1">Subject: {o.subject}</p>
                    <pre className="text-xs text-gray-600 whitespace-pre-wrap font-sans leading-relaxed">{o.body}</pre>
                  </div>
                )}
                <div className="flex gap-2 flex-wrap pt-2 border-t border-gray-100">
                  {editingId !== o.id && <button onClick={()=>startEdit(o)} className="bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs px-3 py-2 rounded-lg font-semibold">✏️ Edit</button>}
                  {m?.email && <button onClick={()=>sendViaMailto(o)} className="bg-blue-600 hover:bg-blue-700 text-white text-xs px-3 py-2 rounded-lg font-semibold">✉ Open in mail client</button>}
                  <select value={o.status} onChange={e=>setStatus(o.id, e.target.value)} className="border border-gray-200 rounded-lg px-2 py-1.5 text-xs bg-white ml-auto">
                    {['drafted','sent','opened','replied','meeting-booked','no-response','declined','placed'].map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
                {o.status === 'replied' && (
                  <div className="mt-3 pt-3 border-t border-gray-100">
                    <label className="text-xs font-semibold text-gray-600">Reply note</label>
                    <textarea className="w-full mt-1 border border-gray-200 rounded-lg px-3 py-2 text-xs" rows="2" placeholder="What did they say?" value={o.replyText||''} onChange={e=>setReply(o.id, e.target.value)}/>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};
