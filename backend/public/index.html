/* ════════════════════════════════════════════════════════════════════
   API client — every external call goes through our backend.
   No keys are ever stored or referenced in the browser.
   ════════════════════════════════════════════════════════════════════ */
async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
    ...opts,
    body: opts.body ? (typeof opts.body === 'string' ? opts.body : JSON.stringify(opts.body)) : undefined,
  });
  let data = null;
  try { data = await res.json(); } catch { /* might be empty */ }
  if (!res.ok) {
    const err = new Error((data && data.error) || `HTTP ${res.status}`);
    err.status = res.status;
    err.body = data;
    throw err;
  }
  return data;
}
const apiGet = (p) => api(p, { method: 'GET' });
const apiPost = (p, body) => api(p, { method: 'POST', body });
const apiPatch = (p, body) => api(p, { method: 'PATCH', body });
const apiDelete = (p) => api(p, { method: 'DELETE' });

// Humanize a pipeline step for display. A null managerId is candidate-search mode,
// NOT an error — never surface a raw "managerId: null" debug value to the operator.
function formatPipelineStep(s) {
  if (s.step === 'manager') {
    if (s.status) return s.status;
    return s.managerId ? 'Hiring manager linked' : 'Manager lookup skipped — candidate search mode';
  }
  return Object.entries(s)
    .filter(([k, v]) => k !== 'step' && v !== null && v !== undefined && v !== '')
    .map(([k, v]) => `${k}: ${v}`)
    .join(' · ');
}

/* ════════════════════════════════════════════════════════════════════
   STATE — mirror of server collections, refreshed on demand.
   Source of truth is the backend at /api/*
   ════════════════════════════════════════════════════════════════════ */
const initialState = {
  health: null,
  stats: null,
  companies: [], hiring_managers: [], hiring_needs: [],
  candidates: [], candidate_validations: [],
  matches: [], outreach: [], client_reports: [], activity_logs: [],
  loading: false, errorMsg: '',
};

async function refreshAll(setState) {
  setState(s => ({ ...s, loading: true, errorMsg: '' }));
  try {
    const [health, stats, companies, managers, needs, candidates, validations, matches, outreach, reports, logs] = await Promise.all([
      apiGet('/api/health').catch(() => null),
      apiGet('/api/dashboard/stats').catch(() => null),
      apiGet('/api/companies').catch(() => []),
      apiGet('/api/hiring-managers').catch(() => []),
      apiGet('/api/hiring-needs').catch(() => []),
      apiGet('/api/candidates').catch(() => []),
      apiGet('/api/candidate-validations').catch(() => []),
      apiGet('/api/matches').catch(() => []),
      apiGet('/api/outreach').catch(() => []),
      apiGet('/api/client-reports').catch(() => []),
      apiGet('/api/activity-logs').catch(() => []),
    ]);
    setState(s => ({
      ...s, loading: false,
      health, stats,
      companies: companies || [], hiring_managers: managers || [], hiring_needs: needs || [],
      candidates: candidates || [], candidate_validations: validations || [],
      matches: matches || [], outreach: outreach || [],
      client_reports: reports || [], activity_logs: logs || [],
    }));
  } catch (e) {
    setState(s => ({ ...s, loading: false, errorMsg: e.message || 'Failed to load' }));
  }
}

function latestValidation(validations, candidateId) {
  const all = (validations || []).filter(v => v.candidateId === candidateId);
  if (!all.length) return null;
  return all.slice().sort((a, b) => new Date(b.validatedAt) - new Date(a.validatedAt))[0];
}

const fmt = d => d ? new Date(d).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) : '–';
const fmtTime = d => d ? new Date(d).toLocaleString() : '–';

const tierColor = t =>
  t === 'Verified Active' ? 'bg-emerald-100 text-emerald-700'
  : t === 'Profile-Based' ? 'bg-blue-100 text-blue-700'
  : t === 'Insufficient Data' ? 'bg-gray-100 text-gray-500'
  : 'bg-gray-100 text-gray-500';

const matchTierColor = t =>
  t === 'Strong Match' || t === 'Strong' ? 'bg-emerald-100 text-emerald-700'
  : t === 'Good Match' || t === 'Good' ? 'bg-indigo-100 text-indigo-700'
  : t === 'Relevant Security Profile' ? 'bg-cyan-100 text-cyan-700'
  : t === 'Partial Match' || t === 'Possible' ? 'bg-amber-100 text-amber-700'
  : t === 'Weak Match' ? 'bg-gray-100 text-gray-600'
  : 'bg-gray-100 text-gray-500';

const CYBERSECURITY_EVIDENCE_TERMS = [
  'CISSP', 'CCSP', 'CISM', 'Security+', 'AZ-500', 'SC-200', 'SC-100',
  'Azure Security', 'Microsoft Sentinel', 'KQL', 'SIEM', 'SOC',
  'Incident Response', 'IAM', 'Defender for Cloud', 'Cloud Security',
];
function hasCybersecurityEvidence(candidate = {}, match = {}) {
  const evidenceText = [
    candidate.name,
    candidate.currentTitle,
    candidate.currentCompany,
    candidate.summary,
    ...(candidate.skills || []),
    ...(match.matchedSkills || []),
    ...(match.reasoning || []),
    match.whyFits,
    match.evidenceNotes,
    match.validationTier,
  ].join(' ').toLowerCase();
  return CYBERSECURITY_EVIDENCE_TERMS.some(term => evidenceText.includes(term.toLowerCase()));
}
function matchDisplayLabel(score, candidate = {}, match = {}) {
  if (score >= 70) return 'Strong Match';
  if (score >= 60) return 'Good Match';
  if (score >= 50) return hasCybersecurityEvidence(candidate, match)
    ? 'Relevant Security Profile'
    : 'Partial Match';
  return 'Weak Match';
}
function matchDisplayHelper(score) {
  if (score >= 50 && score < 60) return 'Partial role fit — review missing skills before client submission.';
  if (score < 50) return 'Weak role fit — review carefully before client submission.';
  return '';
}

/* ════════════════════════════════════════════════════════════════════
   ERROR BOUNDARY
   ════════════════════════════════════════════════════════════════════ */
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error('ErrorBoundary:', error, info); }
  render() {
    if (this.state.error) {
      return (
        <div className="p-8 max-w-2xl mx-auto">
          <div className="bg-red-50 border border-red-200 rounded-2xl p-6">
            <h2 className="font-bold text-red-800 mb-2">Something went wrong</h2>
            <p className="text-sm text-red-700 mb-3">{String(this.state.error?.message || this.state.error)}</p>
            <button onClick={() => location.reload()} className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm font-semibold">Reload</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

/* ════════════════════════════════════════════════════════════════════
   PIPELINE PAGE — one-click
   ════════════════════════════════════════════════════════════════════ */
const PipelinePage = ({state, refresh, navigateTo, resetRunView}) => {
  const [form, setForm] = useState({ company: '', role: '', skills: '', location: '', seniority: 'Mid' });
  const [running, setRunning] = useState(false);
  const [result, setResult] = useState(null);
  const [err, setErr] = useState('');
  const [templates, setTemplates] = useState([]);

  useEffect(() => {
    apiGet('/api/role-templates').then(r => setTemplates((r && r.templates) || [])).catch(() => {});
  }, []);

  const SENIORITY_OPTIONS = ['Junior','Mid','Senior','Staff','Principal','Director'];
  const applyTemplate = (id) => {
    const t = templates.find(x => x.id === id);
    if (!t) return;
    // Map free-text seniority (e.g. "Mid to Senior") to a valid dropdown option.
    const sen = SENIORITY_OPTIONS.find(o => (t.defaultSeniority || '').includes(o)) || 'Mid';
    setForm(p => ({
      ...p,
      role: t.title || p.role,
      skills: (t.requiredSkills || []).join(', '),
      location: t.defaultLocation || p.location,
      seniority: sen,
    }));
  };

  const run = async () => {
    setErr('');
    if (!form.company.trim() || !form.role.trim()) { setErr('Company and role are required'); return; }
    setRunning(true);
    setResult(null);
    resetRunView();
    try {
      const body = {
        company: form.company.trim(),
        role: form.role.trim(),
        skills: form.skills ? form.skills.split(',').map(s=>s.trim()).filter(Boolean) : [],
        location: form.location.trim(),
        seniority: form.seniority,
      };
      const res = await apiPost('/api/pipeline/run', body);
      setResult(res);
      await refresh();
    } catch (e) {
      setErr(e.message || 'Pipeline failed');
    } finally {
      setRunning(false);
    }
  };

  return (
    <div className="p-8 fade-in max-w-3xl">
      <div className="flex items-center gap-3 mb-6">
        <div className="w-11 h-11 rounded-xl bg-indigo-100 flex items-center justify-center text-2xl">⚡</div>
        <div>
          <h1 className="text-2xl font-bold text-gray-900">One-Click Pipeline</h1>
          <p className="text-indigo-600 text-sm font-medium">Type a company and role → run the full demand-first pipeline</p>
        </div>
      </div>

      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 mb-6">
        {templates.length > 0 && (
          <div className="mb-4">
            <label className="block text-xs font-semibold text-gray-600 mb-1">Start from a saved role template (optional)</label>
            <select className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-white" defaultValue="" onChange={e=>{ applyTemplate(e.target.value); e.target.value=''; }}>
              <option value="">— Select a role template to prefill —</option>
              {templates.map(t => <option key={t.id} value={t.id}>{t.title}</option>)}
            </select>
            <p className="text-[11px] text-gray-400 mt-1">Prefills role, required skills, location, and seniority. You can edit any field after.</p>
          </div>
        )}
        <div className="grid grid-cols-2 gap-3 mb-3">
          <div>
            <label className="block text-xs font-semibold text-gray-600 mb-1">Company *</label>
            <input className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-200" placeholder="e.g. Acme Cloud Security" value={form.company} onChange={e=>setForm(p=>({...p, company: e.target.value}))}/>
          </div>
          <div>
            <label className="block text-xs font-semibold text-gray-600 mb-1">Role *</label>
            <input className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-200" placeholder="e.g. Cloud Security Engineer" value={form.role} onChange={e=>setForm(p=>({...p, role: e.target.value}))}/>
          </div>
          <div className="col-span-2">
            <label className="block text-xs font-semibold text-gray-600 mb-1">Required skills (comma-separated)</label>
            <input className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-200" placeholder="Azure, Sentinel, KQL, IAM, SOC" value={form.skills} onChange={e=>setForm(p=>({...p, skills: e.target.value}))}/>
          </div>
          <div>
            <label className="block text-xs font-semibold text-gray-600 mb-1">Location</label>
            <input className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-200" placeholder="Remote / Austin, TX" value={form.location} onChange={e=>setForm(p=>({...p, location: e.target.value}))}/>
          </div>
          <div>
            <label className="block text-xs font-semibold text-gray-600 mb-1">Seniority</label>

        <button onClick={run} disabled={running} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl text-sm font-semibold disabled:opacity-50 flex items-center justify-center gap-2">
          {running ? <><Spinner/> Running pipeline…</> : '⚡ Run Pipeline'}
        </button>
        <p className="text-xs text-gray-400 text-center mt-3">Pipeline: company → manager → confirmed need → source candidates → validate → match → client report. Runs may take up to a minute.</p>
      </div>

      {result && (
        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 fade-in">
          <h2 className="font-bold text-gray-900 mb-3">Pipeline Result</h2>
          <div className="space-y-2 mb-4">
            {(result.steps || []).map((s, i) => (
              <div key={i} className="flex items-center gap-3 text-sm py-1.5 border-b border-gray-50 last:border-0">
                <Badge cls="bg-indigo-100 text-indigo-700">Step {i+1}</Badge>
                <span className="font-semibold text-gray-700">{s.step}</span>
                <span className="text-gray-500 text-xs">{formatPipelineStep(s)}</span>
              </div>
            ))}
          </div>
          {result.report && (
            <div className="flex gap-2">
              <button onClick={()=>navigateTo('client-reports', { reportId: result.report.id, needId: result.needId, pipelineRunId: result.pipelineRunId })} className="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-2.5 rounded-xl text-sm font-semibold">📄 View client report</button>
              <button onClick={()=>navigateTo('matches', { needId: result.needId, pipelineRunId: result.pipelineRunId })} className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2.5 rounded-xl text-sm font-semibold">View matches →</button>
            </div>
          )}
        </div>
      )}
    </div>
  );
};

const CompaniesPage = ({state, refresh, navigateTo}) => {

  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({name:'', industry:'', size:'', hqLocation:'', domain:''});
  const [busy, setBusy] = useState(null);

  const add = async () => {
    if (!form.name.trim()) return alert('Company name required');
    try { await apiPost('/api/companies', form); setForm({name:'', industry:'', size:'', hqLocation:'', domain:''}); setShowAdd(false); await refresh(); }
    catch (e) { alert(e.message); }
  };
  const detectNeeds = async (id) => {
    setBusy(id);
    try { await apiPost('/api/needs/detect', { companyId: id }); await refresh(); }
    catch (e) { alert(e.message); }
    finally { setBusy(null); }
  };
  const filtered = (state.companies || []).filter(c =>
    !filter || c.name?.toLowerCase().includes(filter.toLowerCase()) || c.industry?.toLowerCase().includes(filter.toLowerCase())
  );
  const statsFor = c => ({
    managers: state.hiring_managers.filter(m => m.companyId === c.id).length,
    needs: state.hiring_needs.filter(n => n.companyId === c.id).length,
    confirmed: state.hiring_needs.filter(n => n.companyId === c.id && n.confirmed).length,
    matches: state.matches.filter(m => state.hiring_needs.find(n => n.id === m.needId)?.companyId === c.id && m.tier !== 'Drop').length,
  });

  return (
    <div className="p-8 fade-in">
      <div className="flex items-center gap-3 mb-6">
        <div className="w-11 h-11 rounded-xl bg-gray-100 flex items-center justify-center text-2xl">🏢</div>
        <div>
          <h1 className="text-2xl font-bold text-gray-900">Companies</h1>

        <div className="flex gap-3 flex-wrap">
          <input className="flex-1 min-w-48 border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-200"
                 placeholder="Filter by name or industry…" value={filter} onChange={e=>setF(e.target.value)}/>

        </div>
        {showAdd && (
          <div className="mt-3 p-3 border border-indigo-200 bg-indigo-50 rounded-xl">
            <div className="grid grid-cols-2 gap-2 mb-2">
              <input className="border border-gray-200 rounded-lg px-3 py-2 text-sm" placeholder="Name *" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/>
              <input className="border border-gray-200 rounded-lg px-3 py-2 text-sm" placeholder="Domain" value={form.domain} onChange={e=>setForm(p=>({...p,domain:e.target.value}))}/>
              <input className="border border-gray-200 rounded-lg px-3 py-2 text-sm" placeholder="Industry" value={form.industry} onChange={e=>setForm(p=>({...p,industry:e.target.value}))}/>
              <input className="border border-gray-200 rounded-lg px-3 py-2 text-sm" placeholder="Size" value={form.size} onChange={e=>setForm(p=>({...p,size:e.target.value}))}/>
              <input className="border border-gray-200 rounded-lg px-3 py-2 text-sm col-span-2" placeholder="HQ Location" value={form.hqLocation} onChange={e=>setForm(p=>({...p,hqLocation:e.target.value}))}/>

                  <div className="bg-gray-50 rounded-lg py-2"><div className="text-lg font-bold text-gray-900">{s.managers}</div><div className="text-[10px] text-gray-500 uppercase font-semibold">Managers</div></div>
                  <div className="bg-gray-50 rounded-lg py-2"><div className="text-lg font-bold text-gray-900">{s.confirmed}/{s.needs}</div><div className="text-[10px] text-gray-500 uppercase font-semibold">Confirmed</div></div>
                  <div className="bg-gray-50 rounded-lg py-2"><div className="text-lg font-bold text-gray-900">{s.matches}</div><div className="text-[10px] text-gray-500 uppercase font-semibold">Matches</div></div>

            );
          })}
        </div>

  );
};

    finally { setBusyId(null); }

            <div className="grid grid-cols-2 gap-2 mb-2">

              <input className="border border-gray-200 rounded-lg px-3 py-2 text-sm" placeholder="Title" value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))}/>

/* ════════════════════════════════════════════════════════════════════
   HIRING NEEDS PAGE
   ════════════════════════════════════════════════════════════════════ */
const HiringNeedsPage = ({state, refresh, navigateTo, query}) => {
  const [filter, setF] = useState('all');
  const [search, setS] = useState('');
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({title:'', companyName:'', requiredSkills:'', seniority:'Mid', locationType:'Remote', location:'', urgency:'Medium', sourceUrl:'', description:''});
  const [busyId, setBusyId] = useState(null);

  const add = async () => {
    if (!form.title || !form.companyName) return alert('Title and company required');
    const body = { ...form, requiredSkills: form.requiredSkills ? form.requiredSkills.split(',').map(s=>s.trim()).filter(Boolean) : [], confirmed: true };
    try { await apiPost('/api/hiring-needs', body); setForm({title:'', companyName:'', requiredSkills:'', seniority:'Mid', locationType:'Remote', location:'', urgency:'Medium', sourceUrl:'', description:''}); setShowAdd(false); await refresh(); }
    catch (e) { alert(e.message); }
  };
  const setConfirmed = async (id, confirmed) => {
    try { await apiPatch(`/api/hiring-needs/${id}`, { confirmed }); await refresh(); }
    catch (e) { alert(e.message); }
  };
  const del = async (id, title) => {
    if (!window.confirm(`Delete need "${title}"?`)) return;
    try { await apiDelete(`/api/hiring-needs/${id}`); await refresh(); }
    catch (e) { alert(e.message); }
  };
  const scout = async (needId) => {
    setBusyId('scout-' + needId);
    try { await apiPost('/api/scout/run', { needId }); await refresh(); }
    catch (e) { alert(e.message); }
    finally { setBusyId(null); }
  };
  const match = async (needId) => {
    setBusyId('match-' + needId);
    try { await apiPost('/api/matchmaker/run', { needId }); await refresh(); navigateTo('matches', { needId }); }
    catch (e) { alert(e.message); }
    finally { setBusyId(null); }
  };

  const companyFilter = query?.companyId;
  const filtered = state.hiring_needs.filter(n => {
    if (companyFilter && n.companyId !== companyFilter) return false;
    if (filter === 'confirmed' && !n.confirmed) return false;
    if (filter === 'unconfirmed' && n.confirmed) return false;
    if (filter === 'open' && n.status !== 'open') return false;
    if (search) {
      const co = state.companies.find(c => c.id === n.companyId)?.name || '';
      if (![n.title, co, ...(n.requiredSkills||[])].some(s => String(s).toLowerCase().includes(search.toLowerCase()))) return false;
    }
    return true;
  });

  return (
    <div className="p-8 fade-in">
      <div className="flex items-center gap-3 mb-6">
        <div className="w-11 h-11 rounded-xl bg-rose-100 flex items-center justify-center text-2xl">🎯</div>
        <div><h1 className="text-2xl font-bold text-gray-900">Hiring Needs</h1><p className="text-rose-600 text-sm font-medium">Confirm before sourcing</p></div>
      </div>

      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 mb-6">
        <div className="flex gap-3 flex-wrap items-center">
          <input className="flex-1 min-w-48 border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-rose-200" placeholder="Search title, company, or skill…" value={search} onChange={e=>setS(e.target.value)}/>
          <div className="flex gap-1">
            {['all','confirmed','unconfirmed','open'].map(f => (
              <button key={f} onClick={()=>setF(f)} className={`px-3 py-1.5 rounded-lg text-xs font-medium capitalize ${filter===f?'bg-rose-600 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>{f}</button>
            ))}
          </div>
          <button onClick={()=>setShowAdd(!showAdd)} className="bg-gray-100 hover:bg-gray-200 text-gray-700 px-5 py-2.5 rounded-xl text-sm font-semibold whitespace-nowrap">+ Add Manually</button>
        </div>
        {showAdd && (
          <div className="mt-3 p-3 border border-rose-200 bg-rose-50 rounded-xl">
            <div className="grid grid-cols-2 gap-2 mb-2">
              <input className="border border-gray-200 rounded-lg px-3 py-2 text-sm" placeholder="Title *" value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))}/>
              <input className="border border-gray-200 rounded-lg px-3 py-2 text-sm" placeholder="Company *" value={form.companyName} onChange={e=>setForm(p=>({...p,companyName:e.target.value}))}/>
              <input className="border border-gray-200 rounded-lg px-3 py-2 text-sm col-span-2" placeholder="Required skills (comma-separated)" value={form.requiredSkills} onChange={e=>setForm(p=>({...p,requiredSkills:e.target.value}))}/>
              <select className="border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white" value={form.seniority} onChange={e=>setForm(p=>({...p,seniority:e.target.value}))}>
                {['Junior','Mid','Senior','Staff','Principal','Director'].map(s=><option key={s}>{s}</option>)}
              </select>
              <select className="border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white" value={form.locationType} onChange={e=>setForm(p=>({...p,locationType:e.target.value}))}>
                {['Remote','Hybrid','Onsite'].map(s=><option key={s}>{s}</option>)}
              </select>
              <input className="border border-gray-200 rounded-lg px-3 py-2 text-sm" placeholder="Location" value={form.location} onChange={e=>setForm(p=>({...p,location:e.target.value}))}/>
              <select className="border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white" value={form.urgency} onChange={e=>setForm(p=>({...p,urgency:e.target.value}))}>
                {['Low','Medium','High','Critical'].map(s=><option key={s}>{s}</option>)}
              </select>
              <input className="border border-gray-200 rounded-lg px-3 py-2 text-sm col-span-2" placeholder="Source URL (job post)" value={form.sourceUrl} onChange={e=>setForm(p=>({...p,sourceUrl:e.target.value}))}/>
              <textarea className="border border-gray-200 rounded-lg px-3 py-2 text-sm col-span-2" placeholder="Description" rows="2" value={form.description} onChange={e=>setForm(p=>({...p,description:e.target.value}))}/>
            </div>
            <div className="flex gap-2">
              <button onClick={add} className="flex-1 bg-rose-600 hover:bg-rose-700 text-white px-3 py-2 rounded-lg text-xs font-semibold">Add Need (auto-confirmed)</button>
              <button onClick={()=>setShowAdd(false)} className="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-2 rounded-lg text-xs font-semibold">Cancel</button>
            </div>
          </div>
        )}
      </div>

      {!state.hiring_needs.length ? (
        <Empty icon="🎯" title="No hiring needs yet" sub="Detect from a Company card, run the Pipeline, or add manually."/>
      ) : (
        <div className="space-y-3">
          {filtered.map(n => {
            const co = state.companies.find(c => c.id === n.companyId);
            const matchCount = state.matches.filter(m => m.needId === n.id && m.tier !== 'Drop').length;
            return (
              <div key={n.id} className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 fade-in">
                <div className="flex items-start justify-between gap-4 mb-3">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 mb-1 flex-wrap">
                      <h3 className="font-bold text-gray-900 text-sm">{n.title}</h3>
                      {n.confirmed ? <Badge cls="bg-emerald-100 text-emerald-700">✓ confirmed</Badge> : <Badge cls="bg-amber-100 text-amber-700">unconfirmed</Badge>}
                      <Badge cls={statusColor(n.status)}>{n.status}</Badge>
                      <Badge cls={urgencyColor(n.urgency)}>{n.urgency} urgency</Badge>
                      <Badge cls="bg-gray-100 text-gray-600">{n.seniority}</Badge>
                      <Badge cls="bg-gray-100 text-gray-600">{n.locationType}{n.location?` · ${n.location}`:''}</Badge>
                    </div>
                    <p className="text-xs text-gray-600 font-semibold">🏢 {co?.name || '—'}</p>
                    {n.description && <p className="text-xs text-gray-500 mt-2 line-clamp-2">{n.description}</p>}
                    {(n.requiredSkills||[]).length>0 && (
                      <div className="flex flex-wrap gap-1 mt-2">
                        {n.requiredSkills.map(s => <Badge key={s} cls="bg-blue-50 text-blue-700">{s}</Badge>)}
                      </div>
                    )}
                    {n.sourceUrl && <a href={n.sourceUrl} target="_blank" rel="noopener" className="text-xs text-blue-600 hover:underline mt-2 inline-block break-all">📎 {n.sourceUrl}</a>}
                  </div>
                </div>
                <div className="flex gap-2 flex-wrap pt-3 border-t border-gray-100">
                  {!n.confirmed
                    ? <button onClick={()=>setConfirmed(n.id, true)} className="bg-emerald-600 hover:bg-emerald-700 text-white text-xs px-3 py-2 rounded-lg font-semibold">✓ Confirm</button>
                    : <button onClick={()=>setConfirmed(n.id, false)} className="bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs px-3 py-2 rounded-lg font-semibold">↶ Unconfirm</button>}
                  <button onClick={()=>scout(n.id)} disabled={busyId==='scout-'+n.id || !n.confirmed} title={!n.confirmed ? 'Confirm need first' : ''} className="bg-indigo-600 hover:bg-indigo-700 text-white text-xs px-3 py-2 rounded-lg font-semibold disabled:opacity-50 flex items-center gap-1">{busyId==='scout-'+n.id ? <><Spinner/> Sourcing…</> : '🔍 Source candidates'}</button>
                  <button onClick={()=>match(n.id)} disabled={busyId==='match-'+n.id || !state.candidates.length} title={!state.candidates.length ? 'Need candidates first' : ''} className="bg-amber-500 hover:bg-amber-600 text-white text-xs px-3 py-2 rounded-lg font-semibold disabled:opacity-50 flex items-center gap-1">{busyId==='match-'+n.id ? <><Spinner/> Matching…</> : `⭐ Build shortlist (${matchCount})`}</button>
                  <button onClick={()=>navigateTo('matches', { needId: n.id })} className="bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs px-3 py-2 rounded-lg font-semibold">View matches →</button>
                  <button onClick={()=>del(n.id, n.title)} className="bg-red-50 hover:bg-red-100 text-red-500 text-xs px-3 py-2 rounded-lg font-semibold ml-auto">🗑</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

/* ════════════════════════════════════════════════════════════════════
   CANDIDATES PAGE
   ════════════════════════════════════════════════════════════════════ */
const CandidatesPage = ({state, refresh}) => {
  const [filter, setF] = useState('');
  const [tierFilter, setTF] = useState('all');
  // Scout decision filter — separates real shortlist candidates ("accepted")
  // from review-pool / rejected / demo / unset rows so they are never
  // confused with the final shortlist.
  const [decisionFilter, setDF] = useState('accepted');
  const [validating, setV] = useState(false);

  const validateAll = async () => {
    setV(true);
    try { await apiPost('/api/validator/run', {}); await refresh(); }
    catch (e) { alert(e.message); }
    finally { setV(false); }
  };

  const decisionOf = (c) => {
    if (!c) return 'unset';
    if (c.scoutDecision === 'accepted') return 'accepted';
    if (c.scoutDecision === 'review')   return 'review';
    if (c.scoutDecision === 'rejected') return 'rejected';
    if (c.scoutDecision === 'demo' || c.scoutDecision === 'fallback') return 'demo';
    return 'unset'; // null / undefined / '' / anything else
  };
  const decisionBadge = (d) => ({
    accepted: 'bg-emerald-100 text-emerald-700',
    review:   'bg-amber-100 text-amber-700',
    rejected: 'bg-rose-100 text-rose-700',
    demo:     'bg-purple-100 text-purple-700',
    unset:    'bg-gray-100 text-gray-600',
  }[d] || 'bg-gray-100 text-gray-600');
  const decisionLabel = (d) => ({
    accepted: '✅ Accepted',
    review:   '🟡 Review',
    rejected: '🔴 Rejected',
    demo:     '🟣 Demo',
    unset:    '⚪ Unset',
  }[d] || d);

  const filtered = state.candidates.filter(c => {
    if (decisionFilter !== 'all' && decisionOf(c) !== decisionFilter) return false;
    if (filter && ![c.name, c.currentTitle, c.currentCompany, ...(c.skills||[])].some(s => String(s||'').toLowerCase().includes(filter.toLowerCase()))) return false;
    if (tierFilter !== 'all') {
      const v = latestValidation(state.candidate_validations, c.id);
      if (tierFilter === 'unvalidated' && v) return false;
      if (tierFilter !== 'unvalidated' && (!v || v.tier !== tierFilter)) return false;
    }
    return true;
  });
  const decisionCounts = state.candidates.reduce((acc, c) => {
    const d = decisionOf(c);
    acc[d] = (acc[d] || 0) + 1;
    return acc;
  }, { accepted: 0, review: 0, rejected: 0, demo: 0, unset: 0 });
  const counts = {
    all: state.candidates.length,
    'Verified Active': state.candidates.filter(c => latestValidation(state.candidate_validations, c.id)?.tier === 'Verified Active').length,
    'Profile-Based': state.candidates.filter(c => latestValidation(state.candidate_validations, c.id)?.tier === 'Profile-Based').length,
    'Insufficient Data': state.candidates.filter(c => latestValidation(state.candidate_validations, c.id)?.tier === 'Insufficient Data').length,
    unvalidated: state.candidates.filter(c => !latestValidation(state.candidate_validations, c.id)).length,
  };

  return (
    <div className="p-8 fade-in">
      <div className="flex items-center gap-3 mb-6">
        <div className="w-11 h-11 rounded-xl bg-indigo-100 flex items-center justify-center text-2xl">👤</div>
        <div><h1 className="text-2xl font-bold text-gray-900">Candidates</h1><p className="text-indigo-600 text-sm font-medium">Sourced via the Scout · validated against GitHub</p></div>
      </div>

      <div className="bg-amber-50 border border-amber-200 text-amber-800 rounded-xl px-4 py-3 mb-4 text-xs leading-relaxed">
        <strong>This view shows the raw sourcing pool — NOT the final shortlist.</strong> Only candidates with status <span className="font-semibold">Accepted</span> AND a verified profile link enter the visible shortlist. See the <span className="font-semibold">Matches</span> and <span className="font-semibold">Client Reports</span> tabs for the real shortlist.
      </div>

      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 mb-6">
        <div className="flex gap-3 items-center flex-wrap">
          <button onClick={validateAll} disabled={validating || !state.candidates.length} className="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl text-sm font-semibold disabled:opacity-50 flex items-center gap-2">
            {validating ? <><Spinner/> Validating…</> : `✅ Validate all (${state.candidates.length})`}
          </button>
          <input className="flex-1 min-w-48 border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-200" placeholder="Filter by name, skill, company…" value={filter} onChange={e=>setF(e.target.value)}/>
        </div>
        {/* Scout decision filter — separates Accepted (shortlist-eligible) from Review / Rejected / Demo / Unset */}
        <div className="flex gap-2 mt-3 flex-wrap items-center">
          <span className="text-[11px] uppercase tracking-wide text-gray-500 mr-1">Status:</span>
          {[
            ['accepted','✅ Accepted'],
            ['review','🟡 Review'],
            ['rejected','🔴 Rejected'],
            ['demo','🟣 Demo'],
            ['unset','⚪ Unset'],
            ['all','All'],
          ].map(([v, lbl]) => (
            <button key={v} onClick={()=>setDF(v)} className={`px-3 py-1.5 rounded-lg text-xs font-medium ${decisionFilter===v?'bg-indigo-600 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
              {lbl} ({v === 'all' ? state.candidates.length : (decisionCounts[v]||0)})
            </button>
          ))}
        </div>
        <div className="flex gap-2 mt-3 flex-wrap items-center">
          <span className="text-[11px] uppercase tracking-wide text-gray-500 mr-1">Validation:</span>
          {[['all','All'], ['Verified Active','Verified Active'], ['Profile-Based','Profile-Based'], ['Insufficient Data','Insufficient'], ['unvalidated','Unvalidated']].map(([v, lbl]) => (
            <button key={v} onClick={()=>setTF(v)} className={`px-3 py-1.5 rounded-lg text-xs font-medium ${tierFilter===v?'bg-indigo-600 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
              {lbl} ({counts[v]||0})
            </button>
          ))}
        </div>
      </div>

      {!state.candidates.length ? (
        <Empty icon="🔍" title="No candidates yet" sub="Open a confirmed Hiring Need and click 'Source candidates', or run the Pipeline."/>
      ) : (
        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
          {filtered.map(c => {
            const v = latestValidation(state.candidate_validations, c.id);
            return (
              <div key={c.id} className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 hover:shadow-md fade-in">
                <div className="flex items-start gap-3 mb-3">
                  <Avatar url={c.avatarUrl} name={c.name}/>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center justify-between gap-2">
                      <p className="font-bold text-gray-900 truncate text-sm">{c.name}</p>
                      <Badge cls="bg-gray-100 text-gray-500">{c.source}</Badge>
                    </div>
                    <p className="text-gray-500 text-xs truncate mt-0.5">{c.currentTitle || 'No title'}{c.currentCompany ? ` · ${c.currentCompany}` : ''}</p>
                    <div className="flex gap-1 mt-1 flex-wrap">
                      <Badge cls={decisionBadge(decisionOf(c))}>{decisionLabel(decisionOf(c))}</Badge>
                      {v && <Badge cls={tierColor(v.tier)}>{v.tier}</Badge>}
                    </div>
                  </div>
                </div>
                {c.summary && <p className="text-xs text-gray-500 mb-2 line-clamp-2">{c.summary}</p>}
                {c.location && <div className="text-xs text-gray-600 mb-2">📍 {c.location}</div>}
                {(c.skills||[]).length>0 && (
                  <div className="flex flex-wrap gap-1 mb-3">
                    {c.skills.slice(0, 8).map(s => <Badge key={s} cls="bg-slate-100 text-slate-600">{s}</Badge>)}
                  </div>
                )}
                {v?.proficiency && Object.keys(v.proficiency).length>0 && (
                  <div className="space-y-1.5 mb-3">
                    {Object.entries(v.proficiency).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([s, sc])=>(
                      <div key={s} className="flex items-center gap-2">
                        <span className="text-[11px] text-gray-600 w-20 truncate">{s}</span>
                        <div className="flex-1 bg-gray-100 rounded-full h-1.5"><div className="bg-emerald-500 h-1.5 rounded-full" style={{width:`${sc}%`}}/></div>
                        <span className="text-[11px] text-gray-500 w-7 text-right">{sc}</span>
                      </div>
                    ))}
                  </div>
                )}
                <div className="flex flex-wrap gap-1.5 pt-3 border-t border-gray-100">
                  {c.email && <a href={`mailto:${c.email}`} className="px-2.5 py-1.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-lg text-xs font-medium" title={c.email}>✉ Email</a>}
                  {c.github && <a href={c.github} target="_blank" rel="noopener" className="px-2.5 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-xs font-medium">⌂ GitHub</a>}
                  {c.linkedinUrl && <a href={c.linkedinUrl} target="_blank" rel="noopener" className="px-2.5 py-1.5 bg-blue-50 hover:bg-blue-100 text-blue-700 rounded-lg text-xs font-medium">in LinkedIn</a>}
                  {c.portfolioUrl && <a href={c.portfolioUrl.startsWith('http')?c.portfolioUrl:`https://${c.portfolioUrl}`} target="_blank" rel="noopener" className="px-2.5 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-xs font-medium">🌐 Portfolio</a>}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

/* ════════════════════════════════════════════════════════════════════
   MATCHES PAGE
   ════════════════════════════════════════════════════════════════════ */
const MatchesPage = ({state, refresh, navigateTo, query}) => {
  const [showDrop, setShowDrop] = useState(false);
  const [needFilter, setNF] = useState(query?.needId || 'all');
  const [runFilter, setRunFilter] = useState(query?.pipelineRunId || '');
  const [busy, setBusy] = useState(false);
  useEffect(() => { if (query?.needId) setNF(query.needId); }, [query?.needId]);
  useEffect(() => { setRunFilter(query?.pipelineRunId || ''); }, [query?.pipelineRunId]);

  const setStatus = async (id, status) => {
    try { await apiPatch(`/api/matches/${id}`, { status }); await refresh(); }
    catch (e) { alert(e.message); }
  };
  const generateReport = async (needId) => {
    setBusy(true);
    try {
      const res = await apiPost('/api/client-report/generate', { needId, pipelineRunId: runFilter || null });
      if (res?.report?.id) navigateTo('client-reports', { reportId: res.report.id, needId, pipelineRunId: runFilter || null });
      await refresh();
    } catch (e) { alert(e.message); }
    finally { setBusy(false); }
  };

  const filtered = state.matches.filter(m => {
    if (needFilter !== 'all' && m.needId !== needFilter) return false;
    if (runFilter && (m.pipelineRunId || '') !== runFilter) return false;
    if (!showDrop && m.tier === 'Drop') return false;
    return true;
  }).sort((a, b) => b.score - a.score);

  const byNeed = filtered.reduce((acc, m) => { (acc[m.needId] = acc[m.needId] || []).push(m); return acc; }, {});

  return (
    <div className="p-8 fade-in">
      <div className="flex items-center justify-between mb-6">
        <div className="flex items-center gap-3">
          <div className="w-11 h-11 rounded-xl bg-amber-100 flex items-center justify-center text-2xl">⭐</div>
          <div><h1 className="text-2xl font-bold text-gray-900">Matches</h1><p className="text-amber-600 text-sm font-medium">Skills 35 / Seniority 20 / Location 15 / Availability 15 / Validation 15</p></div>
        </div>
        <label className="flex items-center gap-2 text-xs text-gray-600 bg-white border border-gray-200 px-3 py-2 rounded-xl">
          <input type="checkbox" checked={showDrop} onChange={e=>setShowDrop(e.target.checked)}/>
          Show dropped (&lt;70)
        </label>
      </div>

      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 mb-6">
        <div className="flex gap-3 items-center flex-wrap">
          <label className="text-xs text-gray-500 font-semibold">Need:</label>
          <select value={needFilter} onChange={e=>setNF(e.target.value)} className="border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white">
            <option value="all">All needs</option>
            {state.hiring_needs.filter(n=>n.confirmed).map(n => {
              const co = state.companies.find(c=>c.id===n.companyId)?.name;
              return <option key={n.id} value={n.id}>{n.title} — {co||'—'}</option>;
            })}
          </select>
          {runFilter && <Badge cls="bg-indigo-100 text-indigo-700">Current pipeline run only</Badge>}
        </div>
      </div>

      {!Object.keys(byNeed).length ? (
        <Empty icon="⭐" title="No matches yet" sub="Open a Hiring Need and click 'Build shortlist'."/>
      ) : (
        Object.entries(byNeed).map(([needId, items]) => {
          const need = state.hiring_needs.find(n => n.id === needId);
          const co = state.companies.find(c => c.id === need?.companyId);
          return (
            <div key={needId} className="mb-8 fade-in">
              <div className="flex items-center justify-between mb-3 flex-wrap gap-3">
                <div className="flex items-center gap-3">
                  <h2 className="text-base font-bold text-gray-800">{co?.name || '—'} · {need?.title || '—'}</h2>
                  <span className="bg-gray-100 text-gray-500 text-xs px-2 py-0.5 rounded-full">{items.length} match{items.length!==1?'es':''}</span>
                </div>
                <button onClick={()=>generateReport(needId)} disabled={busy} className="bg-emerald-600 hover:bg-emerald-700 text-white text-xs px-4 py-2 rounded-xl font-semibold disabled:opacity-50 flex items-center gap-2">
                  {busy ? <><Spinner/> Generating…</> : '📄 Generate Client Report'}
                </button>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                {items.map(m => {
                  const c = state.candidates.find(x => x.id === m.candidateId);
                  if (!c) return null;
                  const displayLabel = matchDisplayLabel(m.score, c, m);
                  const displayHelper = matchDisplayHelper(m.score);
                  return (
                    <div key={m.id} className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 hover:shadow-md">
                      <div className="flex items-start gap-3 mb-3">
                        <div className="relative flex-shrink-0">
                          <Avatar url={c.avatarUrl} name={c.name}/>
                          <span className="absolute -top-1 -right-1 w-6 h-6 rounded-full bg-gray-800 text-white flex items-center justify-center text-xs font-black">#{m.rank}</span>
                        </div>
                        <div className="flex-1 min-w-0">
                          <p className="font-bold text-gray-900 text-sm truncate">{c.name}</p>
                           <p className="text-gray-500 text-xs">{c.currentTitle}</p>
                           <div className="flex gap-1 mt-1 flex-wrap">
                            <Badge cls={matchTierColor(displayLabel)}>{displayLabel}</Badge>
                            <Badge cls={statusColor(m.status)}>{m.status}</Badge>
                          </div>
                        </div>
                      </div>
                      <div className="mb-3">
                        <div className="flex items-center justify-between text-xs mb-1.5">
                          <span className="text-gray-500 font-medium">Match score</span>
                          <span className="font-bold text-gray-800">{m.score}/100</span>
                        </div>
                        <div className="w-full bg-gray-100 rounded-full h-2"><div className={`h-2 rounded-full ${barColor(m.score)}`} style={{width:`${m.score}%`}}/></div>
                      </div>
                      {(m.matchedSkills||[]).length>0 && (
                        <div className="flex flex-wrap gap-1 mb-2">{m.matchedSkills.slice(0,6).map(s => <Badge key={s} cls="bg-emerald-50 text-emerald-700">✓ {s}</Badge>)}</div>
                      )}
                      {(m.missingSkills||[]).length>0 && (
                        <div className="flex flex-wrap gap-1 mb-2">{m.missingSkills.slice(0,4).map(s => <Badge key={s} cls="bg-red-50 text-red-600">✗ {s}</Badge>)}</div>
                      )}
                      <div className="mb-3 space-y-0.5">
                        {displayHelper && <p className="text-xs text-amber-700">{displayHelper}</p>}
                        {(m.reasoning||[]).slice(0,3).map((r,i) => <p key={i} className="text-xs text-gray-600">• {r}</p>)}
                      </div>
                      {m.status === 'proposed' ? (
                        <div className="flex gap-2">
                          <button onClick={()=>setStatus(m.id, 'approved')} className="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white text-xs py-2 rounded-xl font-semibold">✓ Approve</button>
                          <button onClick={()=>setStatus(m.id, 'rejected')} className="flex-1 bg-gray-100 hover:bg-red-50 text-gray-600 hover:text-red-600 text-xs py-2 rounded-xl font-semibold">✗ Reject</button>
                        </div>
                      ) : (
                        <button onClick={()=>setStatus(m.id, 'proposed')} className="w-full bg-gray-100 hover:bg-gray-200 text-gray-600 text-xs py-2 rounded-xl font-semibold">↺ Reset</button>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })
      )}
    </div>
  );
};

/* ════════════════════════════════════════════════════════════════════
   OUTREACH PAGE
   ════════════════════════════════════════════════════════════════════ */
const OutreachPage = ({state, refresh}) => {
  const [filter, setF] = useState('all');
  const [editingId, setEditingId] = useState(null);
  const [editBody, setEditBody] = useState('');
  const [editSubject, setEditSubject] = useState('');

  const startEdit = (o) => { setEditingId(o.id); setEditSubject(o.subject); setEditBody(o.body); };
  const saveEdit = async () => {
    try { await apiPatch(`/api/outreach/${editingId}`, { subject: editSubject, body: editBody }); setEditingId(null); await refresh(); }
    catch (e) { alert(e.message); }
  };
  const setStatus = async (id, status) => {
    try { await apiPatch(`/api/outreach/${id}`, { status }); await refresh(); }
    catch (e) { alert(e.message); }
  };
  const sendViaMailto = (o) => {
    const m = state.hiring_managers.find(x => x.id === o.managerId);
    if (!m?.email) { alert('Manager has no email'); return; }
    window.location.href = `mailto:${m.email}?subject=${encodeURIComponent(o.subject)}&body=${encodeURIComponent(o.body)}`;
    if (o.status === 'drafted') setStatus(o.id, 'sent');
  };

  const filtered = state.outreach.filter(o => {
    if (filter === 'all') return true;
    if (filter === 'shortlist') return o.kind === 'shortlist-pitch';
    if (filter === 'warm') return o.kind === 'warm-intro';
    return o.status === filter;
  }).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

  return (
    <div className="p-8 fade-in">
      <div className="flex items-center gap-3 mb-6">
        <div className="w-11 h-11 rounded-xl bg-blue-100 flex items-center justify-center text-2xl">✉️</div>
        <div><h1 className="text-2xl font-bold text-gray-900">Outreach</h1><p className="text-blue-600 text-sm font-medium">Drafted by Composer · review and send via your email client</p></div>
      </div>

      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 mb-6">
        <div className="flex gap-2 flex-wrap">
          {['all','drafted','sent','replied','shortlist','warm'].map(f => (
            <button key={f} onClick={()=>setF(f)} className={`px-3 py-1.5 rounded-lg text-xs font-medium capitalize ${filter===f?'bg-blue-600 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
              {f === 'shortlist' ? 'Shortlist pitch' : f === 'warm' ? 'Warm intro' : f}
            </button>
          ))}
        </div>
      </div>

      {!state.outreach.length ? (
        <Empty icon="✉️" title="No outreach drafted yet" sub="From a manager card click 'Warm intro', or from Matches click 'Generate Client Report' which creates a pitch."/>
      ) : (
        <div className="space-y-3">
          {filtered.map(o => {
            const m = state.hiring_managers.find(x => x.id === o.managerId);
            const co = m && state.companies.find(c => c.id === m.companyId);
            const need = o.needId && state.hiring_needs.find(n => n.id === o.needId);
            return (
              <div key={o.id} className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 fade-in">
                <div className="flex items-start justify-between gap-3 mb-3">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap mb-1">
                      <Badge cls={o.kind==='warm-intro' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}>{o.kind === 'warm-intro' ? '🌡 Warm intro' : '⭐ Shortlist pitch'}</Badge>
                      <Badge cls={statusColor(o.status)}>{o.status}</Badge>
                      <span className="text-xs text-gray-400">{fmtTime(o.createdAt)}</span>
                    </div>
                    <p className="text-sm font-bold text-gray-900">{m?.name || '—'} <span className="text-gray-500 font-normal">@ {co?.name || '—'}</span></p>
                    {need && <p className="text-xs text-gray-500">Re: {need.title}</p>}
                    {o.matchIds?.length>0 && <p className="text-xs text-gray-500">Pitching {o.matchIds.length} candidate{o.matchIds.length!==1?'s':''}</p>}
                  </div>
                </div>
                {editingId === o.id ? (
                  <div className="space-y-2 mb-3">
                    <input className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" value={editSubject} onChange={e=>setEditSubject(e.target.value)}/>
                    <textarea className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm font-mono" rows="8" value={editBody} onChange={e=>setEditBody(e.target.value)}/>
                    <div className="flex gap-2">
                      <button onClick={saveEdit} className="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white text-xs py-2 rounded-lg font-semibold">Save</button>
                      <button onClick={()=>setEditingId(null)} className="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 text-xs py-2 rounded-lg font-semibold">Cancel</button>
                    </div>
                  </div>
                ) : (
                  <div className="bg-gray-50 rounded-xl p-3 mb-3">
                    <p className="text-xs font-semibold text-gray-700 mb-1">Subject: {o.subject}</p>
                    <pre className="text-xs text-gray-600 whitespace-pre-wrap font-sans leading-relaxed">{o.body}</pre>
                  </div>
                )}
                <div className="flex gap-2 flex-wrap pt-2 border-t border-gray-100">
                  {editingId !== o.id && <button onClick={()=>startEdit(o)} className="bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs px-3 py-2 rounded-lg font-semibold">✏️ Edit</button>}
                  {m?.email && <button onClick={()=>sendViaMailto(o)} className="bg-blue-600 hover:bg-blue-700 text-white text-xs px-3 py-2 rounded-lg font-semibold">✉ Open in mail client</button>}
                  <select value={o.status} onChange={e=>setStatus(o.id, e.target.value)} className="border border-gray-200 rounded-lg px-2 py-1.5 text-xs bg-white ml-auto">
                    {['drafted','sent','opened','replied','meeting-booked','no-response','declined','placed'].map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

/* ════════════════════════════════════════════════════════════════════
   CLIENT REPORTS PAGE
   ════════════════════════════════════════════════════════════════════ */
const ClientReportsPage = ({state, refresh, query}) => {
  const [openId, setOpenId] = useState(query?.reportId || null);
  const [busy, setBusy] = useState(false);
  const [needId, setNeedId] = useState('');
  const [runFilter, setRunFilter] = useState(query?.pipelineRunId || '');
  useEffect(() => { if (query?.reportId) setOpenId(query.reportId); }, [query?.reportId]);
  useEffect(() => { setRunFilter(query?.pipelineRunId || ''); }, [query?.pipelineRunId]);

  const generate = async () => {
    if (!needId) { alert('Pick a confirmed need first'); return; }
    setBusy(true);
    try {
      const res = await apiPost('/api/client-report/generate', { needId, pipelineRunId: runFilter || null });
      if (res?.report?.id) setOpenId(res.report.id);
      await refresh();
    } catch (e) { alert(e.message); }
    finally { setBusy(false); }
  };

  const copy = async (text, label='Copied') => {
    try { await navigator.clipboard.writeText(text); alert(`${label} to clipboard`); }
    catch { alert('Could not copy — please select and copy manually'); }
  };
  const downloadCSV = (csv, filename) => {
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = filename;
    a.click();
  };

  const reports = state.client_reports.slice().sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const scopedReports = reports.filter(r => {
    if (runFilter && (r.pipelineRunId || '') !== runFilter) return false;
    if (query?.needId && r.needId !== query.needId) return false;
    return true;
  });
  const open = openId ? scopedReports.find(r => r.id === openId) : scopedReports[0];

  return (
    <div className="p-8 fade-in">
      <div className="flex items-center gap-3 mb-6">
        <div className="w-11 h-11 rounded-xl bg-emerald-100 flex items-center justify-center text-2xl">📄</div>
        <div><h1 className="text-2xl font-bold text-gray-900">Client Reports</h1><p className="text-emerald-600 text-sm font-medium">Generate and copy client-ready shortlists</p></div>
      </div>

      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 mb-6">
        <div className="flex gap-3 items-center flex-wrap">
          <label className="text-xs font-semibold text-gray-600">Generate for need:</label>
          <select value={needId} onChange={e=>setNeedId(e.target.value)} className="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white">
            <option value="">— Pick a confirmed need —</option>
            {state.hiring_needs.filter(n=>n.confirmed).map(n => {
              const co = state.companies.find(c=>c.id===n.companyId)?.name;
              return <option key={n.id} value={n.id}>{n.title} — {co||'—'}</option>;
            })}
          </select>
          <button onClick={generate} disabled={busy || !needId} className="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl text-sm font-semibold disabled:opacity-50 flex items-center gap-2">
            {busy ? <><Spinner/> Generating…</> : '📄 Generate'}
          </button>
          {runFilter && <Badge cls="bg-indigo-100 text-indigo-700">Current pipeline run only</Badge>}
        </div>
      </div>

      {!scopedReports.length ? (
        <Empty icon="📄" title="No reports yet" sub={runFilter ? "This pipeline run has not loaded a report yet." : "Pick a confirmed need with built matches and click Generate."}/>
      ) : (
        <div className="grid grid-cols-12 gap-4">
          <div className="col-span-4 space-y-2">
            {scopedReports.map(r => (
              <div key={r.id} onClick={()=>setOpenId(r.id)}
                   className={`p-4 rounded-2xl cursor-pointer border ${open?.id===r.id ? 'bg-emerald-50 border-emerald-300' : 'bg-white border-gray-100 hover:border-gray-200'}`}>
                <p className="font-bold text-gray-900 text-sm">{r.companyName}</p>
                <p className="text-gray-600 text-xs">{r.roleTitle}</p>
                <p className="text-gray-400 text-[11px] mt-1">{fmtTime(r.createdAt)} · {r.candidates?.length || 0} candidates</p>
              </div>
            ))}
          </div>
          {open && (
            <div className="col-span-8 bg-white rounded-2xl border border-gray-100 shadow-sm p-6 fade-in">
              <div className="flex items-start justify-between mb-4 flex-wrap gap-2">
                <div>
                  <h2 className="font-bold text-gray-900">{open.companyName} · {open.roleTitle}</h2>
                  <p className="text-xs text-gray-400">{fmtTime(open.createdAt)}</p>
                </div>
                <div className="flex gap-2">
                  <button onClick={()=>copy(open.emailDraft, 'Email')} className="bg-blue-600 hover:bg-blue-700 text-white text-xs px-3 py-2 rounded-lg font-semibold">📋 Copy Email</button>
                  <button onClick={()=>downloadCSV(open.csv, `report-${open.companyName.replace(/\W+/g,'-')}-${open.id}.csv`)} className="bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs px-3 py-2 rounded-lg font-semibold">↓ Export CSV</button>
                </div>
              </div>

              <div className="bg-gray-50 rounded-xl p-4 mb-4">
                <p className="text-xs font-semibold text-gray-700 uppercase mb-1">Summary</p>
                <p className="text-sm text-gray-800 leading-relaxed">{open.summary}</p>
              </div>

              <p className="text-xs font-semibold text-gray-700 uppercase mb-2">
                Candidates ({open.candidates?.length || 0})
                <span className="text-gray-400 normal-case ml-2">
                  {open.visibleMatchCount > (open.candidates?.length || 0)
                    ? `Top ${open.candidates?.length || 0} of ${open.visibleMatchCount} shown in client report`
                    : `Top ${open.candidates?.length || 0} shown in client report`}
                </span>
              </p>
              <div className="space-y-3 mb-4">
                {(open.candidates || []).map((c, i) => (
                  <div key={i} className="border border-gray-100 rounded-xl p-4">
                    {(() => {
                      const displayLabel = c.displayLabel || matchDisplayLabel(c.score, c, c);
                      const displayHelper = c.displayHelper || matchDisplayHelper(c.score);
                      return (
                        <React.Fragment>
                    <div className="flex items-start justify-between gap-2 mb-2">
                      <div>
                        <p className="font-bold text-gray-900 text-sm">{i+1}. {c.name}</p>
                        <p className="text-xs text-gray-500">{c.currentTitle}{c.currentCompany?` · ${c.currentCompany}`:''}{c.location?` · ${c.location}`:''}</p>
                      </div>
                      <div className="flex gap-1.5">
                        <Badge cls={matchTierColor(displayLabel)}>{displayLabel}</Badge>
                        <Badge cls="bg-gray-100 text-gray-700">{c.score}/100</Badge>
                        {c.validationTier === 'Needs Review' && <Badge cls="bg-amber-100 text-amber-700">Needs Review</Badge>}
                      </div>
                    </div>
                    {c.matchedSkills?.length>0 && (
                      <div className="flex flex-wrap gap-1 mb-1">
                        {c.matchedSkills.map(s => <Badge key={s} cls="bg-emerald-50 text-emerald-700">✓ {s}</Badge>)}
                      </div>
                    )}
                    {c.missingSkills?.length>0 && (
                      <div className="flex flex-wrap gap-1 mb-1">
                        {c.missingSkills.map(s => <Badge key={s} cls="bg-red-50 text-red-600">✗ {s}</Badge>)}
                      </div>
                    )}
                    <div className="text-xs text-gray-600 mt-1 space-y-0.5">
                      <p><strong>Validation:</strong> {c.validationTier}</p>
                      {displayHelper && <p className="text-amber-700"><strong>Fit note:</strong> {displayHelper}</p>}
                      {c.reviewReason && <p><strong>Review note:</strong> {c.reviewReason}</p>}
                      {c.evidenceNotes && <p><strong>Evidence:</strong> {c.evidenceNotes}</p>}
                      <p><strong>Why fits:</strong> {c.whyFits}</p>
                      <p><strong>Next step:</strong> {c.recommendedNextStep}</p>
                    </div>
                    <div className="flex gap-1.5 mt-2">
                      {c.links?.github && <a href={c.links.github} target="_blank" rel="noopener" className="text-[11px] text-blue-600 hover:underline">GitHub</a>}
                      {c.links?.linkedin && <a href={c.links.linkedin} target="_blank" rel="noopener" className="text-[11px] text-blue-600 hover:underline">LinkedIn</a>}
                      {c.links?.portfolio && <a href={c.links.portfolio} target="_blank" rel="noopener" className="text-[11px] text-blue-600 hover:underline">Portfolio</a>}
                    </div>
                        </React.Fragment>
                      );
                    })()}
                  </div>
                ))}
              </div>

              <details className="bg-gray-50 rounded-xl p-3">
                <summary className="text-xs font-semibold text-gray-700 cursor-pointer">📧 Email draft (click to expand)</summary>
                <pre className="text-xs text-gray-700 whitespace-pre-wrap font-mono leading-relaxed mt-3">{open.emailDraft}</pre>
              </details>
            </div>
          )}
        </div>
      )}
    </div>
  );
};

/* ════════════════════════════════════════════════════════════════════
   STATUS / SETTINGS PAGE — read-only health view
   No key inputs (V1 — keys live in Railway env only)
   ════════════════════════════════════════════════════════════════════ */
const StatusPage = ({state, refresh}) => {
  const h = state.health;
  const services = h?.services || {};
  const lc = {
    apollo: 'Apollo.io (Connector)',
    firecrawl: 'Firecrawl (Need Detector + Scout)',
    github: 'GitHub (Scout + Validator)',
    hunter: 'Hunter.io (email enrichment)',
    adzuna: 'Adzuna (job postings fallback)',
    openai: 'OpenAI (outreach + report drafting)',
    airtable: 'Airtable (mirror)',
    clerk: 'Clerk (V2 auth)',
  };

  return (
    <div className="p-8 fade-in max-w-2xl">
      <div className="flex items-center gap-3 mb-8">
        <div className="w-11 h-11 rounded-xl bg-gray-100 flex items-center justify-center text-2xl">⚙️</div>
        <div>
          <h1 className="text-2xl font-bold text-gray-900">Status</h1>
          <p className="text-gray-500 text-sm">Service configuration · keys live in Railway env vars only</p>
        </div>
      </div>

      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 mb-4">
        <div className="flex items-center justify-between mb-4">
          <h2 className="font-bold text-gray-800">Server</h2>
          <button onClick={refresh} className="text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1.5 rounded-lg font-semibold">↻ Refresh</button>
        </div>
        {!h ? <p className="text-sm text-gray-400">Loading…</p> : (
          <div className="space-y-2 text-sm">
            <div className="flex justify-between"><span className="text-gray-500">Status</span><Badge cls="bg-emerald-100 text-emerald-700">{h.status}</Badge></div>
            <div className="flex justify-between"><span className="text-gray-500">Version</span><span className="font-mono text-xs">{h.version}</span></div>
            <div className="flex justify-between"><span className="text-gray-500">Auth</span>
              {h.auth === 'enabled' ? <Badge cls="bg-emerald-100 text-emerald-700">Basic auth enabled</Badge> : <Badge cls="bg-red-100 text-red-700">⚠ Auth disabled</Badge>}
            </div>
            <div className="flex justify-between"><span className="text-gray-500">Data path</span><span className="font-mono text-xs truncate ml-2">{h.dataPath}</span></div>
          </div>
        )}
      </div>

      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 mb-4">
        <h2 className="font-bold text-gray-800 mb-4">External services</h2>
        <div className="space-y-3">
          {Object.keys(lc).map(svc => {
            const s = services[svc];
            return (
              <div key={svc} className="flex items-center justify-between text-sm">
                <span className="text-gray-700">{lc[svc]}</span>
                {s === 'configured'
                  ? <Badge cls="bg-emerald-100 text-emerald-700">✓ configured</Badge>
                  : <Badge cls="bg-gray-100 text-gray-500">missing env vars</Badge>}
              </div>
            );
          })}
        </div>
        <p className="text-[11px] text-gray-400 mt-4">Set env vars in Railway. Server reports presence only — values never leave the server.</p>
      </div>

      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
        <h2 className="font-bold text-gray-800 mb-3">Storage</h2>
        <p className="text-sm text-gray-600 mb-3">All internal records persist to <code className="bg-gray-100 px-1 rounded">data.json</code> at the configured DATA_PATH. Mount a Railway Volume there for durability.</p>
        <div className="grid grid-cols-3 gap-2 text-center">
          {[
            ['Companies', state.companies.length],
            ['Managers', state.hiring_managers.length],
            ['Needs', state.hiring_needs.length],
            ['Candidates', state.candidates.length],
            ['Validations', state.candidate_validations.length],
            ['Matches', state.matches.length],
            ['Outreach', state.outreach.length],
            ['Reports', state.client_reports.length],
            ['Activity logs', state.activity_logs.length],
          ].map(([lbl, n]) => (
            <div key={lbl} className="bg-gray-50 rounded-xl py-3">
              <div className="text-xl font-bold text-gray-900">{n}</div>
              <div className="text-[10px] uppercase font-semibold text-gray-500">{lbl}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

/* ════════════════════════════════════════════════════════════════════
   APP
   ════════════════════════════════════════════════════════════════════ */
const App = () => {
  const [state, setState] = useState(initialState);
  const [page, setPage] = useState('dashboard');
  const [query, setQuery] = useState({});

  const refresh = useCallback(() => refreshAll(setState), []);
  const navigateTo = useCallback((p, q={}) => { setPage(p); setQuery(q); }, []);
  const setPageOnly = useCallback((p) => { setPage(p); setQuery({}); }, []);
  const resetRunView = useCallback(() => {
    setQuery({});
    setState(s => ({
      ...s,
      candidates: [],
      candidate_validations: [],
      matches: [],
      client_reports: [],
      loading: true,
      errorMsg: '',
    }));
  }, []);

  useEffect(() => { refresh(); }, [refresh]);

  const authDisabled = state.health?.auth && state.health.auth !== 'enabled';

  let content;
  if (state.loading && !state.health) {
    content = <div className="p-8 text-gray-400 text-sm">Loading…</div>;
  } else if (state.errorMsg) {
    content = (
      <div className="p-8">
        <div className="bg-red-50 border border-red-200 rounded-2xl p-6 max-w-xl">
          <h2 className="font-bold text-red-800 mb-2">Backend unreachable</h2>
          <p className="text-sm text-red-700 mb-3">{state.errorMsg}</p>
          <button onClick={refresh} className="bg-red-600 hover:bg-red-700 text-white text-xs px-4 py-2 rounded-lg font-semibold">Retry</button>
        </div>
      </div>
    );
  } else {
    const props = { state, refresh, navigateTo, setPage: setPageOnly, query, resetRunView };
    const pages = {
      dashboard:        <Dashboard {...props}/>,
      pipeline:         <PipelinePage {...props}/>,
      companies:        <CompaniesPage {...props}/>,
      'hiring-managers':<HiringManagersPage {...props}/>,
      'hiring-needs':   <HiringNeedsPage {...props}/>,
      candidates:       <CandidatesPage {...props}/>,
      matches:          <MatchesPage {...props}/>,
      outreach:         <OutreachPage {...props}/>,
      'client-reports': <ClientReportsPage {...props}/>,
      settings:         <StatusPage {...props}/>,
    };
    content = pages[page] || pages.dashboard;
  }

  return (
    <div className="flex h-screen overflow-hidden">
      <Sidebar page={page} setPage={setPageOnly}/>
      <main className="ml-60 flex-1 overflow-y-auto">
        {authDisabled && (
          <div className="bg-red-600 text-white text-center text-sm py-2 font-semibold">
            ⚠ INTERNAL_PASSWORD env var not set — auth is disabled. Configure on Railway.
          </div>
        )}
        {content}
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
